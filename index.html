<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Roguelike: Подземелье Координат</title>
    
    <script src="rot.min.js"></script>
    <script src="seedrandom.min.js"></script>
    
    <script src="sprite_registry.js"></script>
    <script src="name_generator.js"></script>
    <script src="worldCurve.js"></script>
    <script src="dungeon_generator.js"></script>
    <script src="data.js"></script>
    <script src="map.js"></script>
    <script src="entity.js"></script>
    <script src="combat.js"></script>
    <script src="globalMap.js"></script>
    
    <!-- ВАЖНО: TilesetRenderer должен быть загружен ДО render.js -->
    <script src="tileset_renderer.js"></script> 
    
    <script src="render.js"></script>
    <script src="npc_generator.js"></script>
    <script src="effect_system.js"></script>
    <script src="lore.js"></script>
    <script src="quest_system.js"></script>
    <script src="game.js"></script>

    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --danger: #f85149;
            --gold: #d29922;
            --font-stack: 'Consolas', 'Monaco', monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-stack);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #game-layout {
            display: grid;
            /* Увеличим высоту хедера до 120px, чтобы компас влезал комфортно */
            grid-template-columns: 260px 1fr 260px;
            grid-template-rows: 120px 1fr 140px; 
            height: 100%;
            gap: 4px;
            padding: 4px;
            box-sizing: border-box;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        h3 {
            margin: 0 0 8px 0;
            font-size: 13px;
            text-transform: uppercase;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 4px;
            letter-spacing: 1px;
        }

        header {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column; 
            justify-content: center; /* Центрируем содержимое по вертикали */
            align-items: center;
            text-align: center;
            padding: 5px 15px; 
        }

        .loc-info { 
            text-align: center; 
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px; /* Отступы между элементами */
        }

        .loc-name { 
            color: var(--accent); 
            font-weight: bold; 
            font-size: 1.1em; 
            line-height: 1.2;
        }

        /* Стили для компаса */
        #quest-compass-container {
            height: 24px; /* Фиксированная высота под размер стрелки */
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 2px 0;
        }

        #ui-quest-compass {
            display: none; /* Скрыт по умолчанию */
            font-size: 20px;
            color: #ffd700;
            transition: transform 0.3s ease-out;
            line-height: 1;
        }

        .loc-coords { 
            color: var(--text-dim); 
            font-size: 0.8em; 
        }
        
        #map-container {
            grid-column: 2;
            grid-row: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        #map-container canvas {
            display: block;
            transform-origin: center center;
            image-rendering: pixelated;
        }

        .stat-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; }
        .val-hp { color: var(--danger); }
        .val-atk { color: var(--gold); }
        .val-def { color: var(--accent); }
        
        .equip-slot { font-size: 12px; margin-bottom: 4px; color: #aaa; }
        .equip-item { color: var(--gold); }

        #inventory-list { overflow-y: auto; flex: 0 0 auto; max-height: 30%; margin-bottom: 5px; }
        .inv-item {
            padding: 3px 5px;
            background: rgba(255,255,255,0.05);
            margin-bottom: 3px;
            cursor: pointer;
            font-size: 11px;
            border-radius: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .inv-item:hover { background: rgba(255,255,255,0.1); }

        #log-list {
            overflow-y: auto;
            flex: 1;
            font-size: 11px;
            display: flex;
            flex-direction: column-reverse;
        }
        .log-msg { margin-bottom: 2px; line-height: 1.2; word-wrap: break-word; }
        .log-combat { color: var(--danger); }
        .log-loot { color: var(--gold); }
        .log-info { color: var(--accent); }

        .log-lore { 
            color: #d2b48c;
            font-style: italic;
            border-left: 3px solid #8b7355;
            padding-left: 8px;
            background: rgba(139, 115, 85, 0.1);
            margin-top: 4px;
            margin-bottom: 4px;
            font-family: 'Georgia', serif;
            font-size: 12px;
            line-height: 1.4;
        }

        #minimap-panel {
            grid-column: 1;
            grid-row: 3;
            display: flex;
            flex-direction: column;
        }
        #minimap { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            border-radius: 4px;
            image-rendering: pixelated;
        }

        footer {
            grid-column: 2 / 4;
            grid-row: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            font-size: 12px;
            color: var(--text-dim);
        }
        kbd { background: #333; padding: 2px 6px; border-radius: 4px; color: #fff; border: 1px solid #444; }
    </style>
</head>
<body>

<div id="game-layout">
    <header class="panel">
        <div style="font-weight:bold; font-size:16px;">👾 Roguelike JS</div>
        
        <div class="loc-info">
            <div id="ui-loc-name" class="loc-name">Инициализация...</div>
            
            <!-- Контейнер компаса -->
            <div id="quest-compass-container">
                <div id="ui-quest-compass">➤</div>
            </div>

            <div id="ui-loc-coords" class="loc-coords">Выход: —</div>
        </div>
    </header>

    <div class="panel" style="grid-row: 2;">
        <h3>Персонаж</h3>
        <div id="ui-stats"></div>
        
        <h3 style="margin-top: 15px;">Экипировка</h3>
        <div id="ui-equip"></div>

        <h3 style="margin-top: 15px; color: var(--accent);">👁️ Инспектор</h3>
        <div id="ui-inspector" style="font-size: 12px; color: var(--text-dim); min-height: 40px;">
            <div style="font-style: italic; opacity: 0.7;">Кликните по объекту на карте...</div>
        </div>
    </div>

    <div id="map-container"></div>

    <div class="panel" style="grid-row: 2;">
        <h3>Инвентарь</h3>
        <div id="inventory-list"></div>
        <h3 style="margin-top: 10px;">Журнал событий</h3>
        <div id="log-list"></div>
    </div>
    
    <div id="minimap-panel" class="panel">
        <h3>Карта мира</h3>
        <canvas id="minimap"></canvas>
    </div>

    <footer class="panel">
        <span><kbd>←↑↓→</kbd> Движение / Атака</span>
        <span><kbd>Space</kbd> Пропуск хода</span>
        <span><kbd>Click</kbd> Использовать предмет</span>
    </footer>
</div>

</body>
</html>
