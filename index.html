
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Roguelike: Подземелье Координат | Touch + Keyboard</title>
    
    <!-- ROT.js v2.2.1 -->
    <script src="https://cdn.jsdelivr.net/npm/rot-js@2.2.1/dist/rot.min.js"></script>
    <!-- Seedrandom (глобальная функция, не конструктор) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    
    <!-- ВАШИ МОДУЛИ (предполагается, что они существуют и предоставляют глобальные объекты) -->
    <script src="name_generator.js"></script>
    <script src="dungeon_generator.js"></script>
    <script src="worldCurve.js"></script>
    <script src="effect_system.js"></script>
    <script src="npc_generator.js"></script>

    <style>
        /* --- CSS: АДАПТИВНАЯ КАРТА + ТАЧ-ЗОНЫ --- */
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --danger: #f85149;
            --gold: #d29922;
            --font-stack: 'Consolas', 'Monaco', monospace;
        }
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-stack);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: pan-x pan-y;
        }
        #game-layout {
            display: grid;
            grid-template-columns: 260px 1fr 260px;
            grid-template-rows: 60px 1fr 140px;
            height: 100%;
            gap: 4px;
            padding: 4px;
            box-sizing: border-box;
        }
        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        h3 {
            margin: 0 0 8px 0;
            font-size: 13px;
            text-transform: uppercase;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 4px;
            letter-spacing: 1px;
        }
        header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
        }
        .loc-info { text-align: right; }
        .loc-name { color: var(--accent); font-weight: bold; font-size: 1.1em; }
        .loc-coords { color: var(--text-dim); font-size: 0.85em; }
        .loc-desc { color: var(--text-dim); font-size: 0.8em; font-style: italic; margin-top: 2px;}
        .loc-type { color: var(--gold); font-size: 0.8em; margin-top: 2px; }

        #map-container {
            grid-column: 2;
            grid-row: 2;
            background: #000;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            padding: 0;
            display: flex;
            touch-action: none;
            cursor: pointer;
        }
        #map-container canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
            image-rendering: pixelated;
            pointer-events: none;
        }
        .touch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            touch-action: none;
        }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; }
        .val-hp { color: var(--danger); }
        .val-atk { color: var(--gold); }
        .val-def { color: var(--accent); }
        .val-spd { color: #aaffaa; }
        .val-crit { color: #ffaa00; }
        .equip-slot { font-size: 12px; margin-bottom: 4px; color: #aaa; }
        .equip-item { color: var(--gold); }
        #inventory-list { overflow-y: auto; flex: 0 0 auto; max-height: 30%; margin-bottom: 5px; }
        .inv-item {
            padding: 3px 5px;
            background: rgba(255,255,255,0.05);
            margin-bottom: 3px;
            cursor: pointer;
            font-size: 11px;
            border-radius: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .inv-item:hover { background: rgba(255,255,255,0.1); }
        #log-list {
            overflow-y: auto;
            flex: 1;
            font-size: 11px;
            display: flex;
            flex-direction: column-reverse;
        }
        .log-msg { margin-bottom: 2px; line-height: 1.2; word-wrap: break-word; }
        .log-combat { color: var(--danger); }
        .log-loot { color: var(--gold); }
        .log-info { color: var(--accent); }
        .log-crit { color: #ffaa00; font-weight: bold; }
        #minimap-panel {
            grid-column: 1;
            grid-row: 3;
            display: flex;
            flex-direction: column;
        }
        #minimap { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            border-radius: 4px;
            image-rendering: pixelated;
        }
        footer {
            grid-column: 2 / 4;
            grid-row: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            font-size: 12px;
            color: var(--text-dim);
            flex-wrap: wrap;
        }
        kbd { background: #333; padding: 2px 6px; border-radius: 4px; color: #fff; border: 1px solid #444; }
        @media (max-width: 760px) {
            #game-layout { grid-template-columns: 200px 1fr 180px; gap: 2px; }
            .panel { padding: 5px; }
            h3 { font-size: 11px; }
            .stat-row, .equip-slot, .inv-item { font-size: 10px; }
            footer { gap: 8px; font-size: 9px; }
        }
        @media (max-width: 600px) {
            #game-layout { grid-template-columns: 140px 1fr 130px; }
            .loc-name { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div id="game-layout">
    <header class="panel">
        <div style="font-weight:bold; font-size:16px;">👾 Roguelike JS | Touch</div>
        <div class="loc-info">
            <div id="ui-loc-type" class="loc-type"></div>
            <div id="ui-loc-name" class="loc-name">Инициализация...</div>
            <div id="ui-loc-desc" class="loc-desc"></div>
            <div id="ui-loc-coords" class="loc-coords">X: 0, Y: 0</div>
        </div>
    </header>

    <div class="panel" style="grid-row: 2;">
        <h3>Персонаж</h3>
        <div id="ui-stats"></div>
        <h3 style="margin-top: 15px;">Экипировка</h3>
        <div id="ui-equip"></div>
    </div>

    <div id="map-container"></div>

    <div class="panel" style="grid-row: 2 / 4;">
        <h3>Инвентарь</h3>
        <div id="inventory-list"></div>
        <h3 style="margin-top: 10px;">Журнал событий</h3>
        <div id="log-list"></div>
    </div>

    <div id="minimap-panel" class="panel">
        <h3>Карта мира</h3>
        <canvas id="minimap"></canvas>
    </div>

    <footer class="panel">
        <span><kbd>←↑↓→</kbd> / <kbd>Tap</kbd> вокруг @</span>
        <span><kbd>Space</kbd> пропуск хода</span>
        <span><kbd>Клик по предмету</kbd> использовать</span>
    </footer>
</div>

<script>
/**
 * ====================================================================
 * ОСНОВНОЙ ИГРОВОЙ МОДУЛЬ (использует внешние зависимости)
 * ====================================================================
 */

// Проверка загрузки внешних модулей (если они не загрузились — ошибка будет видна в консоли)
if (typeof NameGeneratorModule === 'undefined') console.warn("name_generator.js не загружен");
if (typeof DungeonGeneratorModule === 'undefined') console.warn("dungeon_generator.js не загружен");
if (typeof WorldCurveModule === 'undefined') console.warn("worldCurve.js не загружен");
if (typeof EffectSystemModule === 'undefined') console.warn("effect_system.js не загружен");
if (typeof NpcGeneratorModule === 'undefined') console.warn("npc_generator.js не загружен");

const DataModule = {
    ITEM_ADJECTIVES: ["Ржавый", "Новый", "Тяжелый", "Острый", "Древний", "Магический"],
    ENEMY_TYPES: [
        { name: "Гоблин", char: "g", color: "#4CAF50", hp: 10, atk: 2, def: 0, speed: 9 },
        { name: "Скелет", char: "s", color: "#B0BEC5", hp: 15, atk: 3, def: 1, speed: 10 },
        { name: "Орк",    char: "O", color: "#8BC34A", hp: 30, atk: 6, def: 2, speed: 8 },
        { name: "Призрак",char: "G", color: "#7C4DFF", hp: 12, atk: 5, def: 0, speed: 12 },
        { name: "Дракон", char: "D", color: "#FF5722", hp: 80, atk: 15, def: 5, speed: 11 }
    ],
    ITEM_TYPES: [
        { type: "weapon", char: "/", color: "#FFD700", baseName: "Меч", stat: "atk", val: [2, 5] },
        { type: "armor",  char: "]", color: "#9E9E9E", baseName: "Броня", stat: "def", val: [1, 3] },
        { type: "potion_hp", char: "!", color: "#f44336", baseName: "Зелье лечения", effect: "heal", val: [10, 20] },
        { type: "potion_str", char: "!", color: "#ff9800", baseName: "Зелье силы", effect: "buff_atk", val: [1, 2] }
    ],
    MAP_WIDTH: 50,
    MAP_HEIGHT: 50
};

// ---------- МОДУЛЬ КАРТЫ (обёртка над DungeonGeneratorModule) ----------
const MapModule = {
    currentMapData: null,
    currentDungeonType: null,
    stairsUp: null,
    stairsDown: null,

    generate: function(gx, gy) {
        const result = DungeonGeneratorModule.generateLevel(gx, gy, DataModule.MAP_WIDTH, DataModule.MAP_HEIGHT);
        this.currentMapData = result.mapData;
        this.currentDungeonType = result.dungeonType;
        this.stairsDown = this._findRandomFloor(result.startPos);
        this.stairsUp = this._findRandomFloor(result.startPos, true);
        return result.startPos;
    },
    isWall: function(x, y) {
        if (!this.currentMapData) return true;
        if (x < 0 || x >= DataModule.MAP_WIDTH || y < 0 || y >= DataModule.MAP_HEIGHT) return true;
        return this.currentMapData[y][x] === 1;
    },
    getRandomFloor: function(excludePos) {
        return this._findRandomFloor(excludePos);
    },
    _findRandomFloor: function(excludePos, far=false) {
        for(let i=0;i<1000;i++) {
            const x = Math.floor(Math.random() * DataModule.MAP_WIDTH);
            const y = Math.floor(Math.random() * DataModule.MAP_HEIGHT);
            if (this.currentMapData[y][x] === 0) {
                if (excludePos && x === excludePos.x && y === excludePos.y) continue;
                if (far && excludePos && Math.abs(x - excludePos.x) + Math.abs(y - excludePos.y) < 10) continue;
                return {x, y};
            }
        }
        return excludePos || {x:0, y:0};
    }
};

// ---------- МОДУЛЬ СОЗДАНИЯ СУЩНОСТЕЙ ----------
const EntityModule = {
    createPlayer: function(x, y) {
        return {
            x: x, y: y,
            char: "@", color: "#FFF",
            hp: WorldCurveModule.getPlayerBaseHP(1), 
            maxHp: WorldCurveModule.getPlayerBaseHP(1),
            atk: WorldCurveModule.getPlayerBaseAtk(1), 
            def: WorldCurveModule.getPlayerBaseDef(1),
            speed: 10,
            critChance: 0.05,
            critDamage: 1.5,
            effects: [],
            level: 1, xp: 0,
            inventory: [],
            equipment: { weapon: null, armor: null }
        };
    },
    createEnemy: function(template, x, y, gx, gy) {
        const difficulty = WorldCurveModule.getEnemyMultiplier(gx, gy);
        return {
            x: x, y: y, name: template.name,
            char: template.char, color: template.color,
            hp: Math.floor(template.hp * difficulty), 
            maxHp: Math.floor(template.hp * difficulty),
            atk: Math.floor(template.atk * difficulty), 
            def: Math.floor(template.def * difficulty),
            speed: template.speed || 10,
            effects: [],
            isEnemy: true
        };
    },
    createItem: function(template, x, y, gx, gy) {
        const adj = DataModule.ITEM_ADJECTIVES[Math.floor(Math.random() * DataModule.ITEM_ADJECTIVES.length)];
        const name = `${adj} ${template.baseName}`;
        const baseVal = Math.floor(template.val[0] + Math.random()*(template.val[1]-template.val[0]));
        const itemMult = WorldCurveModule.getItemPowerMultiplier(gx, gy);
        const finalVal = Math.max(1, Math.floor(baseVal * itemMult));
        return {
            x: x, y: y, name: name,
            char: template.char, color: template.color,
            type: template.type,
            stat: template.stat,
            effect: template.effect,
            val: finalVal,
            isItem: true
        };
    }
};

// ---------- БОЕВОЙ МОДУЛЬ ----------
const CombatModule = {
    attack: function(attacker, defender, logFn) {
        const isCrit = Math.random() < (attacker.critChance || 0.05);
        const critMult = isCrit ? (attacker.critDamage || 1.5) : 1.0;
        let dmg = Math.max(1, attacker.atk - defender.def);
        dmg = Math.floor(dmg * critMult);
        defender.hp -= dmg;
        let msg = `${attacker.name || "Вы"} бьет ${defender.name || "врага"} на ${dmg}.`;
        let type = "combat";
        if (isCrit) {
            msg = `💥 КРИТ! ${attacker.name || "Вы"} наносит ${dmg} урона!`;
            type = "crit";
        }
        logFn(msg, type);
        if (defender.hp <= 0) {
            logFn(`${defender.name || "Враг"} погибает!`, "info");
            return true;
        }
        return false;
    },
    useItem: function(player, index, logFn, updateUiFn) {
        const item = player.inventory[index];
        if (!item) return;
        let used = false;
        if (item.effect === "heal") {
            player.hp = Math.min(player.maxHp, player.hp + item.val);
            logFn(`Вы выпили ${item.name}. HP +${item.val}.`, "loot");
            used = true;
        } else if (item.effect === "buff_atk") {
            player.atk += item.val;
            logFn(`Вы выпили ${item.name}. Сила +${item.val}.`, "loot");
            used = true;
        } else if (item.type === "weapon") {
            if (player.equipment.weapon) {
                player.atk -= player.equipment.weapon.val;
                player.inventory.push(player.equipment.weapon);
            }
            player.equipment.weapon = item;
            player.atk += item.val;
            logFn(`Вы взяли ${item.name}. Атака +${item.val}.`, "loot");
            used = true;
        } else if (item.type === "armor") {
            if (player.equipment.armor) {
                player.def -= player.equipment.armor.val;
                player.inventory.push(player.equipment.armor);
            }
            player.equipment.armor = item;
            player.def += item.val;
            logFn(`Вы надели ${item.name}. Защита +${item.val}.`, "loot");
            used = true;
        }
        if (used) {
            player.inventory.splice(index, 1);
            updateUiFn();
        }
    }
};

// ---------- МОДУЛЬ ОТРИСОВКИ ----------
const RenderModule = {
    display: null,
    fov: null,
    COLS: 50,
    ROWS: 50,
    FONT_SIZE: 14,

    init: function() {
        this.display = new ROT.Display({
            width: this.COLS,
            height: this.ROWS,
            fontSize: this.FONT_SIZE,
            fontFamily: "Consolas, monospace",
            fg: "#ccc",
            bg: "#000"
        });
        const container = document.getElementById("map-container");
        container.innerHTML = "";
        container.appendChild(this.display.getContainer());
        // Оверлей для тачей
        const overlay = document.createElement("div");
        overlay.className = "touch-overlay";
        container.style.position = "relative";
        container.appendChild(overlay);
        this.touchOverlay = overlay;
        this.fov = new ROT.FOV.PreciseShadowcasting((x,y) => !MapModule.isWall(x,y));
    },

    draw: function(player, enemies, items, npcs) {
        this.display.clear();
        const visible = new Set();
        const dtype = MapModule.currentDungeonType || DUNGEON_TYPES[0];

        this.fov.compute(player.x, player.y, 10, (x, y, r, vis) => {
            if (vis) visible.add(`${x},${y}`);
        });

        visible.forEach(key => {
            const [x, y] = key.split(',').map(Number);
            let ch, fg, bg;
            if (MapModule.isWall(x, y)) {
                ch = dtype.wallChar;
                fg = dtype.wallColor;
                bg = "#000";
            } else {
                ch = dtype.floorChar;
                fg = dtype.floorColor;
                bg = "#000";
            }
            if (MapModule.stairsUp && x === MapModule.stairsUp.x && y === MapModule.stairsUp.y) { ch = ">"; fg = "#FFF"; }
            if (MapModule.stairsDown && x === MapModule.stairsDown.x && y === MapModule.stairsDown.y) { ch = "<"; fg = "#888"; }
            this.display.draw(x, y, ch, fg, bg);
        });

        items.forEach(i => { if (visible.has(`${i.x},${i.y}`)) this.display.draw(i.x, i.y, i.char, i.color); });
        npcs.forEach(npc => { if (visible.has(`${npc.x},${npc.y}`)) this.display.draw(npc.x, npc.y, npc.char, npc.color); });
        enemies.forEach(e => { if (e.hp > 0 && visible.has(`${e.x},${e.y}`)) this.display.draw(e.x, e.y, e.char, e.color); });
        this.display.draw(player.x, player.y, player.char, player.color);
        return visible;
    },

    updateUI: function(player, locData) {
        if (locData) {
            document.getElementById("ui-loc-desc").textContent = locData.description;
            document.getElementById("ui-loc-name").textContent = locData.fullName;
            document.getElementById("ui-loc-type").textContent = `Тип: ${locData.themeName} (${MapModule.currentDungeonType ? MapModule.currentDungeonType.name : '?'})`;
        }
        document.getElementById("ui-stats").innerHTML = `
            <div class="stat-row"><span>HP</span> <span class="val-hp">${player.hp}/${player.maxHp}</span></div>
            <div class="stat-row"><span>Атака</span> <span class="val-atk">${player.atk}</span></div>
            <div class="stat-row"><span>Защита</span> <span class="val-def">${player.def}</span></div>
            <div class="stat-row"><span>Скорость</span> <span class="val-spd">${player.speed}</span></div>
            <div class="stat-row"><span>Крит</span> <span class="val-crit">${Math.round(player.critChance*100)}%</span></div>
            <div class="stat-row"><span>Уровень</span> <span>${player.level}</span></div>
        `;
        const w = player.equipment.weapon ? player.equipment.weapon.name : "—";
        const a = player.equipment.armor ? player.equipment.armor.name : "—";
        document.getElementById("ui-equip").innerHTML = `
            <div class="equip-slot">Рука: <span class="equip-item">${w}</span></div>
            <div class="equip-slot">Тело: <span class="equip-item">${a}</span></div>
        `;
        const invDiv = document.getElementById("inventory-list");
        invDiv.innerHTML = "";
        if (player.inventory.length === 0) invDiv.innerHTML = "<div style='color:#555;font-size:11px'>Пусто</div>";
        player.inventory.forEach((item, idx) => {
            const div = document.createElement("div");
            div.className = "inv-item";
            div.style.color = item.color;
            div.textContent = `${item.char} ${item.name} (+${item.val})`;
            div.onclick = () => CombatModule.useItem(player, idx, (m,t)=>this.log(m,t), () => this.updateUI(player, locData));
            invDiv.appendChild(div);
        });
    },

    log: function(msg, type="info") {
        const list = document.getElementById("log-list");
        const div = document.createElement("div");
        div.className = `log-msg log-${type}`;
        div.textContent = `> ${msg}`;
        list.prepend(div);
        if (list.children.length > 50) list.lastChild.remove();
    },

    drawMinimap: function(player, explored) {
        const cvs = document.getElementById("minimap");
        const rect = cvs.parentElement.getBoundingClientRect();
        cvs.width = Math.max(50, rect.width - 20);
        cvs.height = Math.max(50, rect.height - 40);
        const ctx = cvs.getContext("2d");
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,cvs.width,cvs.height);
        const cw = cvs.width / DataModule.MAP_WIDTH;
        const ch = cvs.height / DataModule.MAP_HEIGHT;
        const dtype = MapModule.currentDungeonType || DUNGEON_TYPES[0];
        explored.forEach(k => {
            const [x,y] = k.split(',').map(Number);
            ctx.fillStyle = MapModule.isWall(x,y) ? dtype.wallColor : dtype.floorColor;
            ctx.globalAlpha = 0.5;
            ctx.fillRect(x*cw, y*ch, cw+0.5, ch+0.5);
            ctx.globalAlpha = 1.0;
        });
        ctx.fillStyle = "#0F0";
        ctx.fillRect(player.x*cw, player.y*ch, cw+1, ch+1);
    }
};

// ---------- ГЛАВНЫЙ ИГРОВОЙ МОДУЛЬ ----------
const GameModule = {
    player: null,
    enemies: [],
    items: [],
    npcs: [],
    globalX: 0,
    globalY: 0,
    currentLocData: null,
    explored: new Set(),
    busy: false,

    init: function() {
        RenderModule.init();
        this.globalX = 0;
        this.globalY = 0;
        this.loadLevel(this.globalX, this.globalY);
        window.addEventListener("keydown", (e) => this.handleInput(e));
        this.setupTouchControls();
        RenderModule.log("Игра загружена. Стрелки или касания (верх/низ/лево/право) — движение.", "info");
    },

    setupTouchControls: function() {
        const overlay = RenderModule.touchOverlay;
        if (!overlay) return;
        const container = document.getElementById("map-container");
        const handleTouch = (e) => {
            e.preventDefault();
            if (this.busy || !this.player || this.player.hp <= 0) return;
            const rect = container.getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            const rx = (touch.clientX - rect.left) / rect.width;
            const ry = (touch.clientY - rect.top) / rect.height;
            if (rx < 0 || rx > 1 || ry < 0 || ry > 1) return;
            let dx = 0, dy = 0;
            // Разделение на 4 зоны: верх, низ, лево, право (центр оставлен для случайных касаний)
            if (ry < 0.33) dy = -1;
            else if (ry > 0.66) dy = 1;
            else if (rx < 0.33) dx = -1;
            else if (rx > 0.66) dx = 1;
            else return;
            this.processTurn(dx, dy);
        };
        overlay.addEventListener("touchstart", handleTouch, { passive: false });
        overlay.addEventListener("touchmove", (e) => e.preventDefault(), { passive: false });
    },

    handleInput: function(e) {
        if (this.busy || !this.player || this.player.hp <= 0) return;
        let dx=0, dy=0;
        if (e.key === "ArrowUp") dy = -1;
        if (e.key === "ArrowDown") dy = 1;
        if (e.key === "ArrowLeft") dx = -1;
        if (e.key === "ArrowRight") dx = 1;
        if (dx !== 0 || dy !== 0 || e.key === " ") {
            e.preventDefault();
            this.processTurn(dx, dy);
        }
    },

    loadLevel: function(gx, gy) {
        this.globalX = gx;
        this.globalY = gy;
        this.enemies = [];
        this.items = [];
        this.explored.clear();
        this.currentLocData = NameGeneratorModule.generateLocationData(gx, gy);
        const startPos = MapModule.generate(gx, gy);
        document.getElementById("ui-loc-coords").textContent = `X: ${gx}, Y: ${gy}`;
        RenderModule.log(`Локация: ${this.currentLocData.fullName}`, "info");
        if (!this.player) {
            this.player = EntityModule.createPlayer(startPos.x, startPos.y);
        } else {
            this.player.x = startPos.x;
            this.player.y = startPos.y;
        }
        this.spawnEntities(gx, gy);
        this.renderFrame();
    },

    spawnEntities: function(gx, gy) {
        // Исправлено: seedrandom — это функция, не конструктор
        Math.seedrandom(`ent_${gx}_${gy}`);
        for(let i = 0; i < 6; i++) {
            let pos = MapModule.getRandomFloor(this.player);
            if (pos.x === this.player.x && pos.y === this.player.y) continue;
            const typeIndex = Math.floor(Math.random() * DataModule.ENEMY_TYPES.length);
            const type = DataModule.ENEMY_TYPES[typeIndex];
            this.enemies.push(EntityModule.createEnemy(type, pos.x, pos.y, gx, gy));
        }
        for(let i = 0; i < 4; i++) {
            let pos = MapModule.getRandomFloor(this.player);
            const typeIndex = Math.floor(Math.random() * DataModule.ITEM_TYPES.length);
            const type = DataModule.ITEM_TYPES[typeIndex];
            this.items.push(EntityModule.createItem(type, pos.x, pos.y, gx, gy));
        }
        const npcData = NpcGeneratorModule.generateNPC(gx, gy, this.player);
        if (npcData) {
            let pos = MapModule.getRandomFloor(this.player);
            const occupied = this.enemies.some(e => e.x === pos.x && e.y === pos.y);
            if (!occupied) {
                npcData.x = pos.x;
                npcData.y = pos.y;
                this.npcs.push(npcData);
                RenderModule.log(`Вы заметили: ${npcData.name}`, "info");
            }
        }
    },

    processTurn: function(dx, dy) {
        if (this.busy || !this.player || this.player.hp <= 0) return;
        const nx = this.player.x + dx;
        const ny = this.player.y + dy;
        if (MapModule.isWall(nx, ny)) { this.renderFrame(); return; }

        const enemy = this.enemies.find(e => e.hp > 0 && e.x === nx && e.y === ny);
        if (enemy) {
            CombatModule.attack(this.player, enemy, (m,t)=>RenderModule.log(m,t));
            if (enemy.hp <= 0) this.enemies = this.enemies.filter(e => e.hp > 0);
        } else {
            this.player.x = nx;
            this.player.y = ny;
            const idx = this.items.findIndex(i => i.x === nx && i.y === ny);
            if (idx !== -1) {
                const item = this.items[idx];
                this.player.inventory.push(item);
                RenderModule.log(`Подобрано: ${item.name}`, "loot");
                this.items.splice(idx, 1);
            }
            // Лестницы
            if (MapModule.stairsUp && nx === MapModule.stairsUp.x && ny === MapModule.stairsUp.y) {
                RenderModule.log("Вы поднимаетесь выше (Y-1)...", "info");
                setTimeout(()=>this.loadLevel(this.globalX, this.globalY - 1), 50);
                return;
            }
            if (MapModule.stairsDown && nx === MapModule.stairsDown.x && ny === MapModule.stairsDown.y) {
                RenderModule.log("Вы спускаетесь ниже (Y+1)...", "info");
                setTimeout(()=>this.loadLevel(this.globalX, this.globalY + 1), 50);
                return;
            }
        }

        // Обработка эффектов игрока (например, горение) – используем внешний модуль
        EffectSystemModule.processEffects(this.player, (msg, type) => RenderModule.log(msg, type));
        if (this.player.hp <= 0) {
            RenderModule.log("ВЫ ПОГИБЛИ. Обновите страницу.", "combat");
            this.renderFrame();
            return;
        }

        // Ход врагов
        for(let enemy of this.enemies) {
            if (enemy.hp <= 0) continue;
            EffectSystemModule.processEffects(enemy, (msg, type) => RenderModule.log(msg, type));
            if (enemy.hp <= 0) continue;
            const dist = Math.abs(enemy.x - this.player.x) + Math.abs(enemy.y - this.player.y);
            if (dist < 8) {
                if (dist === 1) {
                    CombatModule.attack(enemy, this.player, (m,t)=>RenderModule.log(m,t));
                } else {
                    const astar = new ROT.Path.AStar(this.player.x, this.player.y, (x,y)=>!MapModule.isWall(x,y), {topology:8});
                    let next = null;
                    astar.compute(enemy.x, enemy.y, (x,y) => {
                        if (!next && (x !== enemy.x || y !== enemy.y)) next = {x,y};
                    });
                    if (next && !this.enemies.some(other => other !== enemy && other.hp > 0 && other.x === next.x && other.y === next.y)) {
                        enemy.x = next.x;
                        enemy.y = next.y;
                    }
                }
            }
        }

        if (this.player.hp <= 0) RenderModule.log("ВЫ ПОГИБЛИ. Обновите страницу.", "combat");
        this.renderFrame();
    },

    renderFrame: function() {
        const vis = RenderModule.draw(this.player, this.enemies, this.items, this.npcs);
        vis.forEach(k => this.explored.add(k));
        RenderModule.updateUI(this.player, this.currentLocData);
        RenderModule.drawMinimap(this.player, this.explored);
    }
};

// Запуск игры
window.onload = () => GameModule.init();
</script>
</body>
</html>
