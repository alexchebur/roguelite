<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roguelike: Подземелье Координат</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --accent-color: #4caf50;
            --danger-color: #f44336;
            --ui-bg: #2d2d2d;
            --border-color: #444;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Верхняя панель: Координаты и Название */
        #header {
            padding: 10px;
            background-color: var(--ui-bg);
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            flex-shrink: 0;
        }
        #location-name {
            font-weight: bold;
            font-size: 1.1em;
            color: var(--accent-color);
            margin-bottom: 5px;
        }
        #coords-display {
            font-size: 0.9em;
            color: #888;
        }
        #world-trend {
            font-size: 0.8em;
            margin-top: 4px;
            font-style: italic;
        }

        /* Основная область игры */
        #game-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            background: #000;
        }

        canvas {
            image-rendering: pixelated; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Панель статов и инвентаря */
        #stats-panel {
            padding: 10px;
            background-color: var(--ui-bg);
            border-top: 1px solid var(--border-color);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 0.9em;
            flex-shrink: 0;
        }

        .stat-box {
            background: rgba(0,0,0,0.2);
            padding: 5px;
            border-radius: 4px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2px;
        }

        #inventory-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 5px;
            min-height: 30px;
        }

        .inv-item {
            background: #444;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.8em;
            cursor: pointer;
            border: 1px solid #555;
        }
        .inv-item:hover { background: #555; }
        .inv-item.weapon { border-color: #ff9800; }
        .inv-item.armor { border-color: #2196f3; }
        .inv-item.consumable { border-color: #4caf50; }

        /* Лог событий */
        #log-container {
            height: 80px;
            overflow-y: auto;
            padding: 5px 10px;
            background: #111;
            font-size: 0.8em;
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .log-entry { margin-bottom: 2px; }
        .log-combat { color: #ff5252; }
        .log-loot { color: #ffd740; }
        .log-info { color: #888; }

        /* Управление */
        #controls {
            padding: 10px;
            background-color: var(--ui-bg);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            flex-shrink: 0;
        }
        
        button {
            background: #444;
            border: 1px solid #555;
            color: white;
            padding: 15px 0;
            font-size: 1.2em;
            border-radius: 5px;
            touch-action: manipulation;
        }
        button:active { background: #666; }
        #btn-up { grid-column: 2; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-wait { grid-column: 2; grid-row: 2; font-size: 0.9em; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }

        /* Модальное окно перехода */
        #transition-modal {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #transition-content {
            background: var(--ui-bg);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--accent-color);
            max-width: 80%;
        }
        #next-level-btn {
            margin-top: 15px;
            padding: 10px 20px;
            background: var(--accent-color);
            border: none;
            color: black;
            font-weight: bold;
        }

    </style>
    <!-- Подключаем внешние модули -->
    <script src="name_generator.js"></script>
    <script src="dungeon_generator.js"></script>
    <script src="worldCurve.js"></script>
</head>
<body>

    <div id="header">
        <div id="location-name">Инициализация...</div>
        <div id="coords-display">X: 0, Y: 0</div>
        <div id="world-trend"></div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="transition-modal">
            <div id="transition-content">
                <h2 id="trans-title">Уровень пройден!</h2>
                <p id="trans-desc">Вы нашли лестницу вниз.</p>
                <button id="next-level-btn">Спуститься</button>
            </div>
        </div>
    </div>

    <div id="stats-panel">
        <div class="stat-box">
            <div class="stat-row"><span>HP:</span> <span id="hp-val">100/100</span></div>
            <div class="stat-row"><span>ATK:</span> <span id="atk-val">5</span></div>
            <div class="stat-row"><span>DEF:</span> <span id="def-val">0</span></div>
            <div class="stat-row"><span>LVL:</span> <span id="lvl-val">1</span></div>
        </div>
        <div class="stat-box">
            <div style="margin-bottom:5px; font-weight:bold;">Инвентарь</div>
            <div id="inventory-list"></div>
        </div>
    </div>

    <div id="log-container"></div>

    <div id="controls">
        <button id="btn-up">↑</button>
        <button id="btn-left">←</button>
        <button id="btn-wait">Ждать</button>
        <button id="btn-right">→</button>
        <button id="btn-down">↓</button>
    </div>

<script>
/**
 * ОСНОВНОЙ СКРИПТ ИГРЫ
 * Интегрирует NameGenerator, DungeonGenerator и WorldCurve
 */

// --- КОНФИГУРАЦИЯ ---
const TILE_SIZE = 24;
const VIEW_WIDTH = 15; // Ширина видимой области в тайлах
const VIEW_HEIGHT = 15;
const MAP_WIDTH = 40;
const MAP_HEIGHT = 40;

// --- СОСТОЯНИЕ ИГРЫ ---
const gameState = {
    player: {
        x: 0, y: 0,
        hp: 100, maxHp: 100,
        baseAtk: 5, baseDef: 0,
        level: 1, xp: 0, nextLevelXp: 100,
        inventory: [],
        equipment: { weapon: null, armor: null }
    },
    currentLevel: {
        x: 0, y: 0,
        map: [],
        items: [], // {x, y, type, data}
        enemies: [], // {x, y, hp, maxHp, atk, def, name, symbol}
        stairs: {x: 0, y: 0},
        visited: new Set(), // "x,y"
        theme: null,
        trend: null
    },
    camera: { x: 0, y: 0 },
    isGameOver: false
};

// --- БАЗЫ ДАННЫХ ПРЕДМЕТОВ И ВРАГОВ ---
const ITEM_TYPES = [
    { id: 'potion_hp', name: 'Зелье лечения', type: 'consumable', effect: 'heal', val: 20, symbol: '♥', color: '#f44336' },
    { id: 'sword_iron', name: 'Железный меч', type: 'weapon', slot: 'weapon', atk: 3, symbol: '†', color: '#ccc' },
    { id: 'shield_wood', name: 'Деревянный щит', type: 'armor', slot: 'armor', def: 2, symbol: '🛡', color: '#8d6e63' },
    { id: 'ring_power', name: 'Кольцо силы', type: 'accessory', slot: 'accessory', atk: 1, symbol: '☀', color: '#ffd700' }
];

const ENEMY_TEMPLATES = [
    { name: 'Крыса', hp: 15, atk: 3, def: 0, symbol: 'r', color: '#a1887f' },
    { name: 'Гоблин', hp: 30, atk: 5, def: 1, symbol: 'g', color: '#4caf50' },
    { name: 'Скелет', hp: 45, atk: 8, def: 2, symbol: 's', color: '#e0e0e0' },
    { name: 'Орк', hp: 80, atk: 12, def: 4, symbol: 'O', color: '#2e7d32' },
    { name: 'Тролль', hp: 150, atk: 18, def: 8, symbol: 'T', color: '#1b5e20' }
];

// --- СИСТЕМНЫЕ ФУНКЦИИ ---

function log(msg, type='info') {
    const container = document.getElementById('log-container');
    const div = document.createElement('div');
    div.className = `log-entry log-${type}`;
    div.innerText = `> ${msg}`;
    container.prepend(div);
    if (container.children.length > 50) container.lastChild.remove();
}

function updateUI() {
    // Stats
    const p = gameState.player;
    // Расчет полных статов с экипировкой
    let totalAtk = p.baseAtk;
    let totalDef = p.baseDef;
    
    if (p.equipment.weapon) totalAtk += p.equipment.weapon.atk || 0;
    if (p.equipment.armor) totalDef += p.equipment.armor.def || 0;

    document.getElementById('hp-val').innerText = `${p.hp}/${p.maxHp}`;
    document.getElementById('atk-val').innerText = totalAtk;
    document.getElementById('def-val').innerText = totalDef;
    document.getElementById('lvl-val').innerText = p.level;

    // Inventory
    const invList = document.getElementById('inventory-list');
    invList.innerHTML = '';
    p.inventory.forEach((item, idx) => {
        const el = document.createElement('div');
        el.className = `inv-item ${item.type}`;
        el.innerText = item.name;
        el.onclick = () => useItem(idx);
        invList.appendChild(el);
    });

    // Header Info
    const lvl = gameState.currentLevel;
    document.getElementById('coords-display').innerText = `X: ${lvl.x}, Y: ${lvl.y}`;
    if (lvl.theme) {
        document.getElementById('location-name').innerText = lvl.theme.fullName;
        document.getElementById('location-name').style.color = lvl.trend ? lvl.trend.color : '#4caf50';
    }
    if (lvl.trend) {
        document.getElementById('world-trend').innerText = `Эффект: ${lvl.trend.name}`;
        document.getElementById('world-trend').style.color = lvl.trend.color;
    }
}

function renderMap() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Настройка размера канваса
    canvas.width = VIEW_WIDTH * TILE_SIZE;
    canvas.height = VIEW_HEIGHT * TILE_SIZE;

    // Очистка
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const p = gameState.player;
    const lvl = gameState.currentLevel;
    const map = lvl.map;

    // Центрирование камеры
    const camX = Math.max(0, Math.min(MAP_WIDTH - VIEW_WIDTH, p.x - Math.floor(VIEW_WIDTH/2)));
    const camY = Math.max(0, Math.min(MAP_HEIGHT - VIEW_HEIGHT, p.y - Math.floor(VIEW_HEIGHT/2)));

    gameState.camera.x = camX;
    gameState.camera.y = camY;

    // Отрисовка тайлов
    for (let y = 0; y < VIEW_HEIGHT; y++) {
        for (let x = 0; x < VIEW_WIDTH; x++) {
            const mapX = camX + x;
            const mapY = camY + y;

            if (mapY >= 0 && mapY < MAP_HEIGHT && mapX >= 0 && mapX < MAP_WIDTH) {
                const tile = map[mapY][mapX];
                const px = x * TILE_SIZE;
                const py = y * TILE_SIZE;

                // Пол
                ctx.fillStyle = lvl.dungeonType.floorColor;
                ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);

                // Стена
                if (tile === 1) {
                    ctx.fillStyle = lvl.dungeonType.wallColor;
                    ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                    // Эффект объема
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.fillRect(px, py + TILE_SIZE - 4, TILE_SIZE, 4);
                }
                
                // Туман войны (простой вариант - затемнение не посещенного)
                // Для простоты пока рисуем все, но можно добавить проверку visited
            }
        }
    }

    // Отрисовка объектов (Предметы, Лестница, Враги, Игрок)
    // Порядок важен: Предметы -> Лестница -> Враги -> Игрок
    
    // 1. Предметы
    lvl.items.forEach(item => {
        if (isVisible(item.x, item.y)) {
            drawEntity(item.x, item.y, item.symbol, item.color);
        }
    });

    // 2. Лестница
    if (isVisible(lvl.stairs.x, lvl.stairs.y)) {
        drawEntity(lvl.stairs.x, lvl.stairs.y, '≡', '#fff');
    }

    // 3. Враги
    lvl.enemies.forEach(en => {
        if (en.hp > 0 && isVisible(en.x, en.y)) {
            drawEntity(en.x, en.y, en.symbol, en.color);
            // HP Bar
            const screenX = (en.x - camX) * TILE_SIZE;
            const screenY = (en.y - camY) * TILE_SIZE;
            const hpPct = en.hp / en.maxHp;
            ctx.fillStyle = 'red';
            ctx.fillRect(screenX, screenY - 4, TILE_SIZE, 3);
            ctx.fillStyle = '#0f0';
            ctx.fillRect(screenX, screenY - 4, TILE_SIZE * hpPct, 3);
        }
    });

    // 4. Игрок
    drawEntity(p.x, p.y, '@', '#ffeb3b');
}

function isVisible(x, y) {
    return x >= gameState.camera.x && x < gameState.camera.x + VIEW_WIDTH &&
           y >= gameState.camera.y && y < gameState.camera.y + VIEW_HEIGHT;
}

function drawEntity(mapX, mapY, char, color) {
    const ctx = document.getElementById('gameCanvas').getContext('2d');
    const screenX = (mapX - gameState.camera.x) * TILE_SIZE;
    const screenY = (mapY - gameState.camera.y) * TILE_SIZE;
    
    ctx.fillStyle = color;
    ctx.font = `${TILE_SIZE-2}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(char, screenX + TILE_SIZE/2, screenY + TILE_SIZE/2 + 2);
}

// --- ГЕНЕРАЦИЯ УРОВНЯ ---

function generateLevelData(x, y) {
    // 1. Получаем данные подземелья из модуля
    const dungeonData = DungeonGeneratorModule.generateLevel(x, y, MAP_WIDTH, MAP_HEIGHT);
    
    // 2. Получаем название и описание
    const locationData = NameGeneratorModule.generateLocationData(x, y);
    
    // 3. Получаем тренд мира
    const trend = WorldCurveModule.getWorldTrend(x, y);

    // 4. Создаем ЕДИНЫЙ генератор для этого уровня для всех сущностей
    // Используем seed самого подземелья, чтобы все было согласовано
    const rng = new SeededRandom(dungeonData.seed);

    // 5. Генерация врагов
    const enemies = [];
    const depth = Math.abs(x) + Math.abs(y);
    // Количество врагов растет с глубиной
    const enemyCount = 5 + Math.floor(depth / 2) + rng.int(0, 3); 
    
    for (let i = 0; i < enemyCount; i++) {
        // Выбираем шаблон врага в зависимости от сложности
        // Чем больше глубина, тем более сильные индексы доступны
        const maxTemplateIdx = Math.min(ENEMY_TEMPLATES.length - 1, Math.floor(depth / 3));
        const template = ENEMY_TEMPLATES[rng.int(0, maxTemplateIdx)];
        
        // Ищем свободную клетку
        let ex, ey;
        let attempts = 0;
        do {
            ex = rng.int(1, MAP_WIDTH - 2);
            ey = rng.int(1, MAP_HEIGHT - 2);
            attempts++;
        } while ((dungeonData.mapData[ey][ex] !== 0 || (ex === dungeonData.startPos.x && ey === dungeonData.startPos.y)) && attempts < 100);

        if (attempts < 100) {
            // Применяем множители сложности из WorldCurve
            const mult = WorldCurveModule.getEnemyMultiplier(x, y);
            
            enemies.push({
                x: ex, y: ey,
                name: template.name,
                symbol: template.symbol,
                color: template.color,
                maxHp: Math.floor(template.hp * mult * (trend.enemyHpMult || 1)),
                hp: Math.floor(template.hp * mult * (trend.enemyHpMult || 1)),
                atk: Math.floor(template.atk * mult * (trend.enemyAtkMult || 1)),
                def: Math.floor(template.def * mult)
            });
        }
    }

    // 6. Генерация предметов (ОБНОВЛЕННАЯ ЛОГИКА: Случайное размещение)
    const items = [];
    
    // Шанс спавна предмета на уровне (базовый + бонус от тренда)
    let itemSpawnChance = 0.3 + (depth * 0.01); 
    if (trend.magicFindMult) itemSpawnChance *= trend.magicFindMult;
    
    // Количество попыток спавна предметов (чем глубже, тем больше попыток)
    const itemAttempts = 15 + Math.floor(depth / 2);
    
    for (let i = 0; i < itemAttempts; i++) {
        // Решаем, спавнить ли предмет в этой попытке
        if (rng.next() > itemSpawnChance) continue; 

        let ix, iy;
        let attempts = 0;
        // Ищем свободное место
        do {
            ix = rng.int(1, MAP_WIDTH - 2);
            iy = rng.int(1, MAP_HEIGHT - 2);
            attempts++;
            // Проверка условий занятости клетки:
            // 1. Это должен быть пол (0)
            // 2. Не точка старта игрока
            // 3. Там нет другого уже созданного предмета
            // 4. Там нет врага
        } while (
            (dungeonData.mapData[iy][ix] !== 0 || 
             (ix === dungeonData.startPos.x && iy === dungeonData.startPos.y) ||
             items.some(it => it.x === ix && it.y === iy) ||
             enemies.some(e => e.x === ix && e.y === iy)
            ) && attempts < 50
        );

        // Если место найдено быстро (менее 50 попыток), создаем предмет
        if (attempts < 50) {
            // Выбор типа предмета из базы
            const itemTemplate = ITEM_TYPES[rng.int(0, ITEM_TYPES.length - 1)];
            
            // Копируем объект, чтобы не мутировать базу данных
            const newItem = { ...itemTemplate };
            newItem.x = ix;
            newItem.y = iy;
            
            // Масштабирование силы предмета от глубины
            const powerMult = WorldCurveModule.getItemPowerMultiplier(x, y);
            
            if (newItem.type === 'weapon' && newItem.atk) {
                newItem.atk = Math.max(1, Math.floor(newItem.atk * powerMult));
                newItem.name = `+${newItem.atk} ${newItem.name}`;
            } else if (newItem.type === 'armor' && newItem.def) {
                newItem.def = Math.max(1, Math.floor(newItem.def * powerMult));
                newItem.name = `+${newItem.def} ${newItem.name}`;
            } else if (newItem.type === 'consumable' && newItem.val) {
                 // Зелья лечат больше на глубине
                 newItem.val = Math.floor(newItem.val * powerMult);
            }

            items.push(newItem);
        }
    }

    // 7. Лестница (подальше от старта)
    let sx, sy;
    let dist = 0;
    do {
        sx = rng.int(1, MAP_WIDTH - 2);
        sy = rng.int(1, MAP_HEIGHT - 2);
        dist = Math.abs(sx - dungeonData.startPos.x) + Math.abs(sy - dungeonData.startPos.y);
    } while (dungeonData.mapData[sy][sx] !== 0 || dist < 10);


    return {
        x: x, y: y,
        map: dungeonData.mapData,
        startPos: dungeonData.startPos,
        dungeonType: dungeonData.dungeonType,
        theme: locationData,
        trend: trend,
        enemies: enemies,
        items: items,
        stairs: { x: sx, y: sy }
    };
}

function enterLevel(x, y) {
    const data = generateLevelData(x, y);
    gameState.currentLevel = data;
    gameState.player.x = data.startPos.x;
    gameState.player.y = data.startPos.y;
    
    // Восстановление HP при переходе на новый уровень (опционально, или только в хабах)
    if (WorldCurveModule.isHubLevel(x, y)) {
        gameState.player.hp = gameState.player.maxHp;
        log("Вы вошли в безопасную зону. Здоровье восстановлено.", "info");
    } else {
        log(`Вы прибыли в: ${data.theme.fullName}`, "info");
    }
    
    updateUI();
    renderMap();
}

// --- ИГРОВАЯ ЛОГИКА ---

function movePlayer(dx, dy) {
    if (gameState.isGameOver) return;

    const p = gameState.player;
    const newX = p.x + dx;
    const newY = p.y + dy;
    const lvl = gameState.currentLevel;

    // Проверка стен
    if (lvl.map[newY][newX] === 1) {
        return; // Стена
    }

    // Проверка врагов (Атака)
    const enemy = lvl.enemies.find(e => e.x === newX && e.y === newY && e.hp > 0);
    if (enemy) {
        attackEnemy(enemy);
        renderMap();
        return;
    }

    // Движение
    p.x = newX;
    p.y = newY;

    // Подбор предметов
    const itemIdx = lvl.items.findIndex(i => i.x === newX && i.y === newY);
    if (itemIdx !== -1) {
        const item = lvl.items[itemIdx];
        pickupItem(item, itemIdx);
    }

    // Переход на следующий уровень
    if (newX === lvl.stairs.x && newY === lvl.stairs.y) {
        showTransition();
        return;
    }

    // Ход врагов
    processEnemyTurn();
    
    updateUI();
    renderMap();
}

function attackEnemy(enemy) {
    const p = gameState.player;
    let totalAtk = p.baseAtk;
    if (p.equipment.weapon) totalAtk += p.equipment.weapon.atk;

    // Критический удар?
    const isCrit = Math.random() < 0.1;
    let dmg = Math.max(1, totalAtk - enemy.def);
    if (isCrit) dmg = Math.floor(dmg * 1.5);

    enemy.hp -= dmg;
    
    let msg = `Вы нанесли ${enemy.name} ${dmg} урона.`;
    if (isCrit) msg += " КРИТИЧЕСКИЙ УДАР!";
    log(msg, "combat");

    // Анимация удара (просто текст в логе пока)
    
    if (enemy.hp <= 0) {
        log(`${enemy.name} погибает!`, "combat");
        // Опыт
        gainXp(10 + Math.floor(Math.abs(gameState.currentLevel.x) + Math.abs(gameState.currentLevel.y)));
    }
}

function processEnemyTurn() {
    const p = gameState.player;
    const lvl = gameState.currentLevel;
    const trend = lvl.trend;

    lvl.enemies.forEach(e => {
        if (e.hp <= 0) return;

        const dist = Math.abs(e.x - p.x) + Math.abs(e.y - p.y);
        
        // Если игрок рядом (атака)
        if (dist === 1) {
            let enemyAtk = e.atk;
            if (trend && trend.enemyAtkMult) enemyAtk = Math.floor(enemyAtk * trend.enemyAtkMult);

            let totalDef = p.baseDef;
            if (p.equipment.armor) totalDef += p.equipment.armor.def;

            const dmg = Math.max(0, enemyAtk - totalDef);
            if (dmg > 0) {
                p.hp -= dmg;
                log(`${e.name} наносит вам ${dmg} урона!`, "combat");
            } else {
                log(`${e.name} атакует, но броня поглощает урон.`, "info");
            }

            if (p.hp <= 0) {
                p.hp = 0;
                gameOver();
            }
        } 
        // Если далеко, движение к игроку (простое)
        else if (dist < 8) {
            let dx = 0, dy = 0;
            if (e.x < p.x) dx = 1;
            else if (e.x > p.x) dx = -1;
            else if (e.y < p.y) dy = 1;
            else if (e.y > p.y) dy = -1;

            // Простая проверка коллизий для врага
            const nextX = e.x + dx;
            const nextY = e.y + dy;
            
            // Враги не ходят сквозь стены и других врагов
            const isWall = lvl.map[nextY][nextX] === 1;
            const isOtherEnemy = lvl.enemies.some(other => other !== e && other.hp > 0 && other.x === nextX && other.y === nextY);
            const isPlayer = (nextX === p.x && nextY === p.y); // Уже обработано выше, но на всякий случай

            if (!isWall && !isOtherEnemy && !isPlayer) {
                e.x = nextX;
                e.y = nextY;
            }
        }
    });
}

function pickupItem(item, index) {
    const p = gameState.player;
    if (p.inventory.length >= 10) {
        log("Инвентарь полон!", "info");
        return;
    }
    
    // Удаляем с карты
    gameState.currentLevel.items.splice(index, 1);
    
    // Добавляем в инвентарь
    p.inventory.push(item);
    log(`Вы подобрали: ${item.name}`, "loot");
    updateUI();
}

function useItem(index) {
    const p = gameState.player;
    const item = p.inventory[index];

    if (item.type === 'consumable') {
        if (item.effect === 'heal') {
            const healAmount = item.val;
            p.hp = Math.min(p.maxHp, p.hp + healAmount);
            log(`Вы выпили ${item.name} и восстановили ${healAmount} HP.`, "info");
        }
        // Удаляем предмет
        p.inventory.splice(index, 1);
    } 
    else if (item.type === 'weapon' || item.type === 'armor') {
        // Экипировка
        const slot = item.slot; // weapon or armor
        const oldItem = p.equipment[slot];
        
        // Снимаем старое (возвращаем в инвентарь)
        if (oldItem) {
            p.inventory.push(oldItem);
        }
        
        // Надеваем новое
        p.equipment[slot] = item;
        // Удаляем из инвентаря тот предмет, который надели
        p.inventory.splice(index, 1);
        
        log(`Вы экипировали ${item.name}.`, "info");
    }

    updateUI();
}

function gainXp(amount) {
    const p = gameState.player;
    p.xp += amount;
    if (p.xp >= p.nextLevelXp) {
        p.level++;
        p.xp -= p.nextLevelXp;
        p.nextLevelXp = Math.floor(p.nextLevelXp * 1.5);
        
        // Рост статов
        p.maxHp += 10;
        p.hp = p.maxHp;
        p.baseAtk += 1;
        p.baseDef += 1;
        
        log(`УРОВЕНЬ ПОВЫШЕН! Теперь вы ${p.level} уровня.`, "loot");
    }
}

function showTransition() {
    const modal = document.getElementById('transition-modal');
    const btn = document.getElementById('next-level-btn');
    modal.style.display = 'flex';
    
    btn.onclick = () => {
        modal.style.display = 'none';
        // Определяем направление прогресса. Для простоты всегда идем "глубже" по X
        // В реальной игре можно выбирать стороны света
        enterLevel(gameState.currentLevel.x + 1, gameState.currentLevel.y);
    };
}

function gameOver() {
    gameState.isGameOver = true;
    alert("GAME OVER! Вы пали в бою.");
    location.reload();
}

// --- УПРАВЛЕНИЕ ---

document.getElementById('btn-up').onclick = () => movePlayer(0, -1);
document.getElementById('btn-down').onclick = () => movePlayer(0, 1);
document.getElementById('btn-left').onclick = () => movePlayer(-1, 0);
document.getElementById('btn-right').onclick = () => movePlayer(1, 0);
document.getElementById('btn-wait').onclick = () => {
    log("Вы ждете...", "info");
    processEnemyTurn();
    renderMap();
};

// Клавиатура
window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowUp' || e.key === 'w') movePlayer(0, -1);
    if (e.key === 'ArrowDown' || e.key === 's') movePlayer(0, 1);
    if (e.key === 'ArrowLeft' || e.key === 'a') movePlayer(-1, 0);
    if (e.key === 'ArrowRight' || e.key === 'd') movePlayer(1, 0);
    if (e.key === ' ') {
        log("Вы ждете...", "info");
        processEnemyTurn();
        renderMap();
    }
});

// --- ЗАПУСК ---
window.onload = () => {
    // Старт в координатах 0,0
    enterLevel(0, 0);
};

</script>
