<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Roguelike: Подземелье Координат</title>
    
    <!-- ROT.js v2.2.1 -->
    <script src="https://cdn.jsdelivr.net/npm/rot-js@2.2.1/dist/rot.min.js"></script>
    <!-- Seedrandom -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    
    <!-- ВАШИ МОДУЛИ -->
    <script src="name_generator.js"></script>
    <script src="dungeon_generator.js"></script>
    <script src="worldCurve.js"></script>

    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --danger: #f85149;
            --gold: #d29922;
            --font-stack: 'Consolas', 'Monaco', monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-stack);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #game-layout {
            display: grid;
            grid-template-columns: 260px 1fr 260px;
            grid-template-rows: 100px 1fr 140px;
            height: 100%;
            gap: 4px;
            padding: 4px;
            box-sizing: border-box;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        h3 {
            margin: 0 0 8px 0;
            font-size: 13px;
            text-transform: uppercase;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 4px;
            letter-spacing: 1px;
        }

        header {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column; 
            justify-content: space-between;
            align-items: center;
            text-align: center;
            padding: 10px 15px; 
        }
        .loc-info { text-align: center; width: 100% }
        .loc-name { color: var(--accent); font-weight: bold; font-size: 1.1em; }
        .loc-coords { color: var(--text-dim); font-size: 0.85em; }
        .loc-desc { color: var(--text-dim); font-size: 0.8em; font-style: italic; margin-top: 2px;}
        .loc-type { color: var(--gold); font-size: 0.8em; margin-top: 2px; }
        
        #map-container {
            grid-column: 2;
            grid-row: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        #map-container canvas {
            display: block;
            transform-origin: center center;
            image-rendering: pixelated;
        }

        .stat-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; }
        .val-hp { color: var(--danger); }
        .val-atk { color: var(--gold); }
        .val-def { color: var(--accent); }
        
        .equip-slot { font-size: 12px; margin-bottom: 4px; color: #aaa; }
        .equip-item { color: var(--gold); }

        #inventory-list { overflow-y: auto; flex: 0 0 auto; max-height: 30%; margin-bottom: 5px; }
        .inv-item {
            padding: 3px 5px;
            background: rgba(255,255,255,0.05);
            margin-bottom: 3px;
            cursor: pointer;
            font-size: 11px;
            border-radius: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .inv-item:hover { background: rgba(255,255,255,0.1); }

        #log-list {
            overflow-y: auto;
            flex: 1;
            font-size: 11px;
            display: flex;
            flex-direction: column-reverse;
        }
        .log-msg { margin-bottom: 2px; line-height: 1.2; word-wrap: break-word; }
        .log-combat { color: var(--danger); }
        .log-loot { color: var(--gold); }
        .log-info { color: var(--accent); }

        #minimap-panel {
            grid-column: 1;
            grid-row: 3;
            display: flex;
            flex-direction: column;
        }
        #minimap { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            border-radius: 4px;
            image-rendering: pixelated;
        }

        footer {
            grid-column: 2 / 4;
            grid-row: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            font-size: 12px;
            color: var(--text-dim);
        }
        kbd { background: #333; padding: 2px 6px; border-radius: 4px; color: #fff; border: 1px solid #444; }

    </style>
</head>
<body>

<div id="game-layout">
    <header class="panel">
        <div style="font-weight:bold; font-size:16px;">👾 Roguelike JS</div>
        <div class="loc-info">
            <div id="ui-loc-name" class="loc-name">Инициализация...</div>
            <div id="ui-loc-type" class="loc-type"></div>
            <div id="ui-loc-desc" class="loc-desc"></div>
            <div id="ui-loc-coords" class="loc-coords">X: 0, Y: 0</div>
        </div>
    </header>

    <div class="panel" style="grid-row: 2;">
        <h3>Персонаж</h3>
        <div id="ui-stats"></div>
        <h3 style="margin-top: 15px;">Экипировка</h3>
        <div id="ui-equip"></div>
    </div>

    <div id="map-container"></div>


    <div class="panel" style="grid-row: 2;">
        <h3>Инвентарь</h3>
        <div id="inventory-list"></div>
        <h3 style="margin-top: 10px;">Журнал событий</h3>
        <div id="log-list"></div>
    </div>
    <div id="minimap-panel" class="panel">
        <h3>Карта мира</h3>
        <canvas id="minimap"></canvas>
    </div>

    <footer class="panel">
        <span><kbd>←↑↓→</kbd> Движение / Атака</span>
        <span><kbd>Space</kbd> Пропуск хода</span>
        <span><kbd>Click</kbd> Использовать предмет</span>
    </footer>
</div>

<script>
/**
 * ====================================================================
 * МОДУЛЬ 1: DATA MODULE
 * ====================================================================
 */
const DataModule = {
    ITEM_ADJECTIVES: ["Ржавый", "Новый", "Тяжелый", "Острый", "Древний", "Магический"],
    
    ENEMY_TYPES: [
        { name: "Гоблин", char: "g", color: "#4CAF50", hp: [10, 20], atk: [2, 4], def: [0, 1] },
        { name: "Скелет", char: "s", color: "#B0BEC5", hp: [15, 25], atk: [3, 6], def: [1, 2] },
        { name: "Орк",    char: "O", color: "#8BC34A", hp: [30, 50], atk: [6, 10], def: [2, 4] },
        { name: "Призрак",char: "G", color: "#7C4DFF", hp: [10, 15], atk: [5, 8], def: [0, 1] },
        { name: "Дракон", char: "D", color: "#FF5722", hp: [80, 120], atk: [15, 25], def: [5, 10] }
    ],

    ITEM_TYPES: [
        { type: "weapon", char: "/", color: "#FFD700", baseName: "Меч", stat: "atk", val: [2, 5] },
        { type: "armor",  char: "]", color: "#9E9E9E", baseName: "Броня", stat: "def", val: [1, 3] },
        { type: "potion_hp", char: "!", color: "#f44336", baseName: "Зелье лечения", effect: "heal", val: [10, 20] },
        { type: "potion_str", char: "!", color: "#ff9800", baseName: "Зелье силы", effect: "buff_atk", val: [1, 2] }
    ],

    MAP_WIDTH: 100,
    MAP_HEIGHT: 100
};

/**
 * ====================================================================
 * МОДУЛЬ 2: MAP WRAPPER
 * ====================================================================
 */
const MapModule = {
    currentMapData: null,
    currentDungeonType: null,
    stairsUp: null,
    stairsDown: null,

    generate: function(gx, gy) {
        const result = DungeonGeneratorModule.generateLevel(gx, gy, DataModule.MAP_WIDTH, DataModule.MAP_HEIGHT);
        
        this.currentMapData = result.mapData;
        this.currentDungeonType = result.dungeonType;
        
        const levelSeed = `lvl_${gx}_${gy}`;
        this.stairsDown = this._findRandomFloor(result.startPos, false, levelSeed + '_down');
        this.stairsUp = this._findRandomFloor(result.startPos, true, levelSeed + '_up');

        return result.startPos;
    },

    isWall: function(x, y) {
        if (!this.currentMapData) return true;
        if (x < 0 || x >= DataModule.MAP_WIDTH || y < 0 || y >= DataModule.MAP_HEIGHT) return true;
        return this.currentMapData[y][x] === 1;
    },

    getRandomFloor: function(excludePos) {
        return this._findRandomFloor(excludePos);
    },

    _findRandomFloor: function(excludePos, far=false, seed=null) {
        if (!seed) seed = `stairs_${this.currentDungeonType?.name || 'default'}`;
    
        const rng = new Math.seedrandom(seed);
        let attempts = 0;
    
        while(attempts < 1000) {
            const x = Math.floor(rng() * DataModule.MAP_WIDTH);
            const y = Math.floor(rng() * DataModule.MAP_HEIGHT);
        
            if (this.currentMapData[y][x] === 0) {
                if (excludePos && x === excludePos.x && y === excludePos.y) {
                    attempts++; continue;
                }
                if (far && excludePos) {
                    const dist = Math.abs(x - excludePos.x) + Math.abs(y - excludePos.y);
                    if (dist < 10) { attempts++; continue; }
                }
                return {x, y};
            }
            attempts++;
        }
        return excludePos || {x:0, y:0};
    }
};

/**
 * ====================================================================
 * МОДУЛЬ 3: ENTITY MODULE (ИСПРАВЛЕННЫЙ)
 * ====================================================================
 */
const EntityModule = {
    createPlayer: function(x, y) {
        return {
            x: x, y: y,
            char: "@", color: "#FFF",
            hp: 5000, maxHp: 5000,
            atk: 5, def: 2,
            level: 1, xp: 0,
            inventory: [],
            equipment: { weapon: null, armor: null }
        };
    },

    createEnemy: function(template, x, y, difficultyMult) {
        const hp = Math.floor(template.hp[0] * difficultyMult);
        const atk = Math.floor(template.atk[0] * difficultyMult);
        const def = Math.floor(template.def[0] * difficultyMult);

        return {
            x: x, y: y, name: template.name,
            char: template.char, color: template.color,
            hp: hp, maxHp: hp,
            atk: atk, def: def,
            isEnemy: true
        };
    },

    createItem: function(template, x, y, itemPowerMult) {
        const adj = DataModule.ITEM_ADJECTIVES[Math.floor(Math.random() * DataModule.ITEM_ADJECTIVES.length)];
        const name = `${adj} ${template.baseName}`;
        
        const baseVal = Math.floor(template.val[0] + Math.random()*(template.val[1]-template.val[0]));
        const finalVal = Math.max(1, Math.floor(baseVal * itemPowerMult));
        
        return {
            x: x, y: y, name: name,
            char: template.char, color: template.color,
            type: template.type,
            stat: template.stat,
            effect: template.effect,
            val: finalVal,
            isItem: true
        };
    },

    // ✅ НОВЫЙ МЕТОД: Безопасное размещение врагов с проверкой дистанции
    spawnEnemies: function(mapGrid, startPos, enemyTemplates, count, difficultyMult, minDist = 3) {
        const height = mapGrid.length;
        const width = mapGrid[0].length;
        const validTiles = [];

        // 1. Собираем все клетки пола, отступая от игрока
        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                if (mapGrid[y][x] === 0) {
                    const distToStart = Math.abs(x - startPos.x) + Math.abs(y - startPos.y);
                    if (distToStart >= 4) { // Зона безопасности 4 клетки вокруг игрока
                        validTiles.push({x, y});
                    }
                }
            }
        }

        // 2. Перемешиваем массив клеток (Fisher-Yates), чтобы убрать предсказуемость
        for (let i = validTiles.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [validTiles[i], validTiles[j]] = [validTiles[j], validTiles[i]];
        }

        // 3. Размещаем врагов с строгой проверкой дистанции
        const placedEnemies = [];
        const occupiedCoords = [];

        for (const tile of validTiles) {
            if (placedEnemies.length >= count) break;

            let tooClose = false;
            for (const occ of occupiedCoords) {
                // Манхэттенское расстояние: |x1-x2| + |y1-y2|
                if (Math.abs(tile.x - occ.x) + Math.abs(tile.y - occ.y) < minDist) {
                    tooClose = true;
                    break;
                }
            }

            if (!tooClose) {
                occupiedCoords.push({x: tile.x, y: tile.y});
                // Выбираем случайный шаблон врага
                const template = enemyTemplates[Math.floor(Math.random() * enemyTemplates.length)];
                placedEnemies.push(this.createEnemy(template, tile.x, tile.y, difficultyMult));
            }
        }

        return placedEnemies;
    }
};

/**
 * ====================================================================
 * МОДУЛЬ 4: COMBAT MODULE
 * ====================================================================
 */
const CombatModule = {
    attack: function(attacker, defender, logFn) {
        let dmg = Math.max(1, attacker.atk - defender.def);
        let crit = Math.random() < 0.1;
        if (crit) dmg = Math.floor(dmg * 1.5);

        defender.hp -= dmg;
        logFn(`${attacker.name || "Вы"} бьет ${defender.name || "врага"} на ${dmg}${crit?" (КРИТ)!":"."}`, "combat");

        if (defender.hp <= 0) {
            logFn(`${defender.name || "Враг"} погибает!`, "info");
            return true;
        }
        return false;
    },

    useItem: function(player, index, logFn, updateUiFn) {
        const item = player.inventory[index];
        if (!item) return;

        let used = false;

        if (item.effect === "heal") {
            player.hp = Math.min(player.maxHp, player.hp + item.val);
            logFn(`Вы выпили ${item.name}. HP +${item.val}.`, "loot");
            used = true;
        } else if (item.effect === "buff_atk") {
            player.atk += item.val;
            logFn(`Вы выпили ${item.name}. Сила +${item.val}.`, "loot");
            used = true;
        } else if (item.type === "weapon") {
            if (player.equipment.weapon) {
                player.atk -= player.equipment.weapon.val;
                player.inventory.push(player.equipment.weapon);
            }
            player.equipment.weapon = item;
            player.atk += item.val;
            logFn(`Вы взяли ${item.name}. Атака +${item.val}.`, "loot");
            used = true;
        } else if (item.type === "armor") {
            if (player.equipment.armor) {
                player.def -= player.equipment.armor.val;
                player.inventory.push(player.equipment.armor);
            }
            player.equipment.armor = item;
            player.def += item.val;
            logFn(`Вы надели ${item.name}. Защита +${item.val}.`, "loot");
            used = true;
        }

        if (used) {
            player.inventory.splice(index, 1);
            updateUiFn();
        }
    }
};

/**
 * ====================================================================
 * МОДУЛЬ 5: RENDER MODULE
 * ====================================================================
 */
const RenderModule = {
    display: null,
    fov: null,
    COLS: 60,
    ROWS: 40,
    FONT_SIZE: 14,

    init: function() {
        if (typeof ROT === 'undefined') {
            alert("Ошибка: Библиотека ROT.js не загрузилась.");
            throw new Error("ROT missing");
        }

        this.display = new ROT.Display({
            width: this.COLS,
            height: this.ROWS,
            fontSize: this.FONT_SIZE,
            fontFamily: "Consolas, monospace",
            fg: "#ccc",
            bg: "#000"
        });
        
        const container = document.getElementById("map-container");
        container.innerHTML = ""; 
        const canvas = this.display.getContainer();
        container.appendChild(canvas);
        
        this.fov = new ROT.FOV.PreciseShadowcasting((x,y) => !MapModule.isWall(x,y));
        
        const resizeGame = () => {
            const fw = container.clientWidth;
            const fh = container.clientHeight;
            const cw = canvas.width;
            const ch = canvas.height;
            
            const scale = Math.min(fw / cw, fh / ch);
            canvas.style.transform = `scale(${scale})`;
        };

        window.addEventListener("resize", resizeGame);
        setTimeout(resizeGame, 50);
    },

    getCameraOffset: function(player) {
        return {
            x: player.x - Math.floor(this.COLS / 2),
            y: player.y - Math.floor(this.ROWS / 2)
        };
    },

    draw: function(player, enemies, items) {
        this.display.clear();
        const dtype = MapModule.currentDungeonType || DUNGEON_TYPES[0];
        const cam = this.getCameraOffset(player);

        const visible = new Set();
        this.fov.compute(player.x, player.y, 25, (x, y, r, vis) => {
            if (vis) visible.add(`${x},${y}`);
        });

        for (let sy = 0; sy < this.ROWS; sy++) {
            for (let sx = 0; sx < this.COLS; sx++) {
                const wx = sx + cam.x;
                const wy = sy + cam.y;
                
                if (wx < 0 || wx >= DataModule.MAP_WIDTH || wy < 0 || wy >= DataModule.MAP_HEIGHT) continue;

                const isVisible = visible.has(`${wx},${wy}`);
                let ch, fg, bg;

                if (MapModule.isWall(wx, wy)) {
                    ch = dtype.wallChar;
                    fg = isVisible ? dtype.wallColor : '#222'; 
                    bg = "#000";
                } else {
                    ch = dtype.floorChar;
                    fg = isVisible ? dtype.floorColor : '#111';
                    bg = "#000";
                }
                
                if (MapModule.stairsUp && wx === MapModule.stairsUp.x && wy === MapModule.stairsUp.y) { 
                    ch = ">"; fg = isVisible ? "#FFF" : "#333"; 
                }
                if (MapModule.stairsDown && wx === MapModule.stairsDown.x && wy === MapModule.stairsDown.y) { 
                    ch = "<"; fg = isVisible ? "#888" : "#222"; 
                }

                this.display.draw(sx, sy, ch, fg, bg);
            }
        }

        items.forEach(i => {
            const sx = i.x - cam.x;
            const sy = i.y - cam.y;
            if (sx >= 0 && sx < this.COLS && sy >= 0 && sy < this.ROWS && visible.has(`${i.x},${i.y}`)) {
                this.display.draw(sx, sy, i.char, i.color);
            }
        });

        enemies.forEach(e => {
            if (e.hp > 0) {
                const sx = e.x - cam.x;
                const sy = e.y - cam.y;
                if (sx >= 0 && sx < this.COLS && sy >= 0 && sy < this.ROWS && visible.has(`${e.x},${e.y}`)) {
                    this.display.draw(sx, sy, e.char, e.color);
                }
            }
        });

        this.display.draw(Math.floor(this.COLS / 2), Math.floor(this.ROWS / 2), player.char, player.color);

        return visible;
    },

    updateUI: function(player, locData, worldTrend) {
        if (locData) {
            document.getElementById("ui-loc-name").textContent = locData.fullName;
            document.getElementById("ui-loc-desc").textContent = locData.description;
            let typeText = `Тип: ${locData.themeName} (${MapModule.currentDungeonType ? MapModule.currentDungeonType.name : '?'})`;
            if (worldTrend && worldTrend.name !== "Обычный уровень") {
                typeText += ` | ${worldTrend.name}`;
                document.getElementById("ui-loc-name").style.color = worldTrend.color;
            } else {
                document.getElementById("ui-loc-name").style.color = "var(--accent)";
            }
            document.getElementById("ui-loc-type").textContent = typeText;
        }
        document.getElementById("ui-stats").innerHTML = `
            <div class="stat-row"><span>HP</span> <span class="val-hp">${player.hp}/${player.maxHp}</span></div>
            <div class="stat-row"><span>Атака</span> <span class="val-atk">${player.atk}</span></div>
            <div class="stat-row"><span>Защита</span> <span class="val-def">${player.def}</span></div>
            <div class="stat-row"><span>Уровень</span> <span>${player.level}</span></div>
        `;
        const w = player.equipment.weapon ? player.equipment.weapon.name : "—";
        const a = player.equipment.armor ? player.equipment.armor.name : "—";
        document.getElementById("ui-equip").innerHTML = `
            <div class="equip-slot">Рука: <span class="equip-item">${w}</span></div>
            <div class="equip-slot">Тело: <span class="equip-item">${a}</span></div>
        `;
        const invDiv = document.getElementById("inventory-list");
        invDiv.innerHTML = "";
        if (player.inventory.length === 0) invDiv.innerHTML = "<div style='color:#555;font-size:11px'>Пусто</div>";
        player.inventory.forEach((item, idx) => {
            const div = document.createElement("div");
            div.className = "inv-item";
            div.style.color = item.color;
            div.textContent = `${item.char} ${item.name} (+${item.val})`;
            div.onclick = () => CombatModule.useItem(player, idx, this.log, () => this.updateUI(player, locData, worldTrend));
            invDiv.appendChild(div);
        });
    },

    log: function(msg, type="info") {
        const list = document.getElementById("log-list");
        const div = document.createElement("div");
        div.className = `log-msg log-${type}`;
        div.textContent = `> ${msg}`;
        list.prepend(div);
        if (list.children.length > 50) list.lastChild.remove();
    },

    drawMinimap: function(player, explored) {
        const cvs = document.getElementById("minimap");
        const rect = cvs.parentElement.getBoundingClientRect();
        cvs.width = rect.width - 20; 
        cvs.height = rect.height - 40; 
        const ctx = cvs.getContext("2d");
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,cvs.width,cvs.height);
        const cw = cvs.width / DataModule.MAP_WIDTH;
        const ch = cvs.height / DataModule.MAP_HEIGHT;
        const dtype = MapModule.currentDungeonType || DUNGEON_TYPES[0];
        explored.forEach(k => {
            const [x,y] = k.split(',').map(Number);
            ctx.fillStyle = MapModule.isWall(x,y) ? dtype.wallColor : dtype.floorColor;
            ctx.globalAlpha = 0.5;
            ctx.fillRect(x*cw, y*ch, cw+0.5, ch+0.5);
            ctx.globalAlpha = 1.0;
        });
        ctx.fillStyle = "#0F0";
        ctx.fillRect(player.x*cw, player.y*ch, cw+1, ch+1);
    }
};

/**
 * ====================================================================
 * МОДУЛЬ 6: GAME MODULE (ИСПРАВЛЕННЫЙ СПАВН)
 * ====================================================================
 */
const GameModule = {
    player: null,
    enemies: [],
    items: [],
    globalX: 0,
    globalY: 0,
    currentLocData: null,
    currentWorldTrend: null,
    explored: new Set(),
    busy: false,
    lastGlobalX: null,
    lastGlobalY: null,

    init: function() {
        try {
            RenderModule.init();
        } catch (e) {
            console.error(e);
            return;
        }
        
        this.globalX = Math.floor(Math.random() * 10);
        this.globalY = Math.floor(Math.random() * 10);
        
        this.loadLevel(this.globalX, this.globalY);
        
        window.addEventListener("keydown", (e) => this.handleInput(e));
        RenderModule.log("Игра загружена. Используйте стрелки.", "info");
    },

    loadLevel: function(gx, gy) {
        this.lastGlobalX = this.globalX;
        this.lastGlobalY = this.globalY;
        this.globalX = gx;
        this.globalY = gy;
        this.enemies = [];
        this.items = [];
        this.explored.clear();

        this.currentLocData = NameGeneratorModule.generateLocationData(gx, gy);
        this.currentWorldTrend = WorldCurveModule.getWorldTrend(gx, gy);
        
        const startPos = MapModule.generate(gx, gy);
        
        document.getElementById("ui-loc-coords").textContent = `X: ${gx}, Y: ${gy}`;
        RenderModule.log(`Локация: ${this.currentLocData.fullName}`, "info");
        if (this.currentWorldTrend.name !== "Обычный уровень") {
            RenderModule.log(`Тренд мира: ${this.currentWorldTrend.name}`, "event");
        }

        let spawnPos;

        if (!this.player) {
            spawnPos = startPos;
            this.player = EntityModule.createPlayer(spawnPos.x, spawnPos.y);
        } else {
            const dx = gx - this.lastGlobalX;
            const dy = gy - this.lastGlobalY;

            // ИСПРАВЛЕНО: Логика спавна у лестниц
            if (dx > 0 || dy > 0) {
                // Поднялись выше -> спавн у лестницы ВНИЗ (<)
                spawnPos = MapModule.stairsDown;
            } else if (dx < 0 || dy < 0) {
                // Спустились ниже -> спавн у лестницы ВВЕРХ (>)
                spawnPos = MapModule.stairsUp;
            } else {
                spawnPos = startPos;
            }

            if (!spawnPos) {
                spawnPos = startPos;
                RenderModule.log("Ошибка навигации: лестница не найдена, спавн в центре.", "combat");
            }

            this.player.x = spawnPos.x;
            this.player.y = spawnPos.y;
        }

        // ✅ ИСПОЛЬЗУЕМ НОВЫЙ УМНЫЙ СПАВН
        this.spawnEntities(gx, gy);
        this.renderFrame();
    },

    // ✅ ПЕРЕПИСАННАЯ ФУНКЦИЯ СПАВНА
    spawnEntities: function(gx, gy) {
        // Враги: используем новый метод с проверкой дистанции
        const enemyCount = 8; // Можно менять количество
        const enemyMult = WorldCurveModule.getEnemyMultiplier(gx, gy);
        
        // Вызываем умный спавнер из EntityModule
        this.enemies = EntityModule.spawnEnemies(
            MapModule.currentMapData, 
            this.player, 
            DataModule.ENEMY_TYPES, 
            enemyCount, 
            enemyMult,
            3 // Минимальная дистанция между врагами
        );

        // Предметы: оставляем простой рандом, так как они не двигаются и не мешают друг другу
        const rng = new Math.seedrandom(`ent_${gx}_${gy}`);
        const oldRand = Math.random;
        Math.random = rng; 

        const itemMult = WorldCurveModule.getItemPowerMultiplier(gx, gy);
        for(let i=0; i<4; i++) {
            const pos = MapModule.getRandomFloor(this.player);
            const type = DataModule.ITEM_TYPES[Math.floor(Math.random() * DataModule.ITEM_TYPES.length)];
            this.items.push(EntityModule.createItem(type, pos.x, pos.y, itemMult));
        }

        Math.random = oldRand;
    },

    handleInput: function(e) {
        if (this.busy || this.player.hp <= 0) return;
        
        let dx=0, dy=0;
        if (e.key==="ArrowUp") dy=-1;
        if (e.key==="ArrowDown") dy=1;
        if (e.key==="ArrowLeft") dx=-1;
        if (e.key==="ArrowRight") dx=1;
        
        if (dx!==0 || dy!==0 || e.key===" ") {
            e.preventDefault();
            this.processTurn(dx, dy);
        }
    },

    processTurn: function(dx, dy) {
        const nx = this.player.x + dx;
        const ny = this.player.y + dy;

        if (MapModule.isWall(nx, ny)) return;

        const enemy = this.enemies.find(e => e.hp>0 && e.x===nx && e.y===ny);
        if (enemy) {
            CombatModule.attack(this.player, enemy, (m,t)=>RenderModule.log(m,t));
        } else {
            this.player.x = nx;
            this.player.y = ny;

            const idx = this.items.findIndex(i => i.x===nx && i.y===ny);
            if (idx !== -1) {
                const item = this.items[idx];
                this.player.inventory.push(item);
                RenderModule.log(`Подобрано: ${item.name}`, "loot");
                this.items.splice(idx, 1);
            }

            if (MapModule.stairsUp && nx===MapModule.stairsUp.x && ny===MapModule.stairsUp.y) {
                RenderModule.log("Вы поднимаетесь выше...", "info");
                setTimeout(()=>this.loadLevel(this.globalX+1, this.globalY+1), 100);
                return;
            }
            if (MapModule.stairsDown && nx===MapModule.stairsDown.x && ny===MapModule.stairsDown.y) {
                RenderModule.log("Вы спускаетесь ниже...", "info");
                setTimeout(()=>this.loadLevel(this.globalX-1, this.globalY-1), 100);
                return;
            }
        }

        this.enemies.forEach(e => {
            if (e.hp<=0) return;
            const dist = Math.abs(e.x-this.player.x) + Math.abs(e.y-this.player.y);
            if (dist < 8) {
                if (dist===1) {
                    CombatModule.attack(e, this.player, (m,t)=>RenderModule.log(m,t));
                } else {
                    const astar = new ROT.Path.AStar(this.player.x, this.player.y, 
                        (x,y)=>!MapModule.isWall(x,y), {topology:8});
                    let next = null;
                    astar.compute(e.x, e.y, (x,y) => {
                        if (!next && (x!==e.x||y!==e.y)) next={x,y};
                    });
                    if (next) {
                        if (!this.enemies.some(other => other!==e && other.hp>0 && other.x===next.x && other.y===next.y)) {
                            e.x = next.x; e.y = next.y;
                        }
                    }
                }
            }
        });

        if (this.player.hp <= 0) RenderModule.log("ВЫ ПОГИБЛИ. F5 для рестарта.", "combat");
        
        this.renderFrame();
    },

    renderFrame: function() {
        const vis = RenderModule.draw(this.player, this.enemies, this.items);
        vis.forEach(k => this.explored.add(k));
        RenderModule.updateUI(this.player, this.currentLocData, this.currentWorldTrend);
        RenderModule.drawMinimap(this.player, this.explored);
    }
};

// Запуск
window.onload = () => GameModule.init();

</script>
</body>
</html>
