<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roguelike: Подземелье Координат</title>
    <!-- Подключение библиотеки rot.js -->
    <script src="https://cdn.jsdelivr.net/npm/rot-js@2.2.0/dist/rot.min.js"></script>
    
    <!-- Подключение наших модулей (порядок важен) -->
    <script src="name_generator.js"></script>
    <script src="worldCurve.js"></script>
    <script src="dungeon_generator.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #eee;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; /* Скрываем скроллбары */
            width: 100vw;
            height: 100vh;
        }

        /* Контейнер для игры, занимающий весь экран */
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Канвас rot.js будет масштабироваться внутри контейнера */
        canvas {
            position: absolute;
            transform-origin: top left; /* Масштабирование от левого верхнего угла */
            image-rendering: pixelated; /* Для четкости пикселей при увеличении */
        }

        /* Интерфейс поверх канваса (если понадобится позже) */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Чтобы клики проходили сквозь UI к игре, если нужно */
            z-index: 10;
        }
        
        .panel {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #444;
            padding: 10px;
            pointer-events: auto;
        }

        /* Пример расположения панелей (можно доработать под ваш дизайн) */
        #stats-panel {
            position: absolute;
            top: 10px;
            left: 10px;
        }
        
        #log-panel {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 14px;
        }

        #controls-hint {
            position: absolute;
            top: 10px;
            right: 10px;
            text-align: right;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- ROT.JS Canvas будет добавлен сюда скриптом -->
        
        <div id="ui-layer">
            <div id="stats-panel" class="panel">
                <div>❤️ HP: <span id="hp-val">100</span>/<span id="max-hp-val">100</span></div>
                <div>⚔️ ATK: <span id="atk-val">10</span></div>
                <div>🛡️ DEF: <span id="def-val">5</span></div>
                <div>📍 X: <span id="pos-x">0</span>, Y: <span id="pos-y">0</span></div>
                <div>🏰 Локация: <span id="loc-name">Загрузка...</span></div>
            </div>

            <div id="controls-hint" class="panel">
                ←↑↓→ Движение / Атака<br>
                Space Пропуск хода<br>
                Click Использовать предмет
            </div>

            <div id="log-panel" class="panel">
                <div id="game-log">Добро пожаловать в Подземелье Координат...</div>
            </div>
        </div>
    </div>

<script>
    // === КОНФИГУРАЦИЯ ROT.JS ===
    // Внутреннее разрешение игры (в клетках). 
    // Не меняйте это слишком сильно, если не хотите менять логику генерации карты.
    const GAME_WIDTH = 80;
    const GAME_HEIGHT = 25;
    const FONT_SIZE = 16; // Базовый размер шрифта для расчета

    // Инициализация дисплея
    const displayOptions = {
        width: GAME_WIDTH,
        height: GAME_HEIGHT,
        fontSize: FONT_SIZE,
        fontFamily: 'monospace',
        fg: '#ccc',
        bg: '#000'
    };

    const display = new ROT.Display(displayOptions);
    const container = document.getElementById("game-container");
    const canvas = display.getContainer();
    
    // Важно: добавляем канвас в наш контейнер
    container.appendChild(canvas);

    // === ЛОГИКА МАСШТАБИРОВАНИЯ (RESIZE) ===
    function resizeGame() {
        const frameWidth = container.clientWidth;
        const frameHeight = container.clientHeight;
        
        // Реальные размеры канваса в пикселях (ROT вычисляет их на основе fontSize и количества клеток)
        // ROT.Display автоматически устанавливает width/height атрибуты canvas
        const canvasWidth = canvas.width;
        const canvasHeight = canvas.height;

        // Вычисляем масштаб, чтобы вписать игру в экран (contain)
        const scaleX = frameWidth / canvasWidth;
        const scaleY = frameHeight / canvasHeight;
        
        // Выбираем меньший масштаб, чтобы игра поместилась целиком
        const scale = Math.min(scaleX, scaleY);

        // Применяем трансформацию
        canvas.style.transform = `scale(${scale})`;
        
        // Центрирование (опционально, так как flexbox в #game-container уже центрирует)
        // Но если transform-origin top left, то может потребоваться корректировка margin
        // При использовании flexbox и absolute positioning внутри relative контейнера, 
        // transform-origin: top left может сместить визуальный центр.
        // Лучший способ для "top left" scaling в центре экрана:
        
        // Вариант с центрированием через margin:
        const scaledWidth = canvasWidth * scale;
        const scaledHeight = canvasHeight * scale;
        
        // Если нужно строго по центру:
        canvas.style.left = (frameWidth - scaledWidth) / 2 + 'px';
        canvas.style.top = (frameHeight - scaledHeight) / 2 + 'px';
    }

    // Слушаем изменение размера окна
    window.addEventListener("resize", resizeGame);
    
    // Вызываем один раз при старте
    // Небольшая задержка, чтобы DOM успел отрисоваться
    setTimeout(resizeGame, 0);


    // === ИГРОВАЯ ЛОГИКА (ЗАГОТОВКА) ===
    
    // Состояние игрока
    let player = {
        x: 40,
        y: 12,
        hp: 100,
        maxHp: 100,
        atk: 10,
        def: 5,
        level: 1
    };

    let currentCoords = { x: 0, y: 0 };
    let mapData = []; // Здесь будет храниться карта
    
    // Функция обновления UI
    function updateUI() {
        document.getElementById('hp-val').innerText = player.hp;
        document.getElementById('max-hp-val').innerText = player.maxHp;
        document.getElementById('atk-val').innerText = player.atk;
        document.getElementById('def-val').innerText = player.def;
        document.getElementById('pos-x').innerText = currentCoords.x;
        document.getElementById('pos-y').innerText = currentCoords.y;
        
        // Генерация названия локации через NameGeneratorModule
        const locData = NameGeneratorModule.generateLocationData(currentCoords.x, currentCoords.y);
        document.getElementById('loc-name').innerText = locData.fullName;
    }

    // Функция логирования
    function log(message, color = "#fff") {
        const logEl = document.getElementById('game-log');
        const entry = document.createElement('div');
        entry.style.color = color;
        entry.innerText = "> " + message;
        logEl.prepend(entry);
        
        // Ограничение истории логов
        if (logEl.children.length > 10) {
            logEl.removeChild(logEl.lastChild);
        }
    }

    // Отрисовка карты (пример)
    function drawMap() {
        display.clear();
        
        // Получаем данные подземелья из DungeonGeneratorModule
        // Для примера берем размер, соответствующий GAME_WIDTH/GAME_HEIGHT
        // Внимание: dungeon_generator возвращает grid [y][x]
        const levelData = DungeonGeneratorModule.generateLevel(currentCoords.x, currentCoords.y, GAME_WIDTH, GAME_HEIGHT);
        mapData = levelData.mapData;
        
        // Установка цветов фона и стен на основе типа подземелья
        // (В реальной игре нужно применять цвета к каждой клетке)
        
        for (let y = 0; y < GAME_HEIGHT; y++) {
            for (let x = 0; x < GAME_WIDTH; x++) {
                const tile = mapData[y][x];
                // 1 - стена, 0 - пол
                if (tile === 1) {
                    display.draw(x, y, levelData.dungeonType.wallChar, levelData.dungeonType.wallColor, "#000");
                } else {
                    display.draw(x, y, levelData.dungeonType.floorChar, levelData.dungeonType.floorColor, "#000");
                }
            }
        }
        
        // Рисуем игрока
        display.draw(player.x, player.y, "@", "#ff0", "#000");
        
        updateUI();
    }

    // Обработка ввода
    document.addEventListener("keydown", function(e) {
        let dx = 0;
        let dy = 0;
        let acted = false;

        switch(e.key) {
            case "ArrowUp": dy = -1; acted = true; break;
            case "ArrowDown": dy = 1; acted = true; break;
            case "ArrowLeft": dx = -1; acted = true; break;
            case "ArrowRight": dx = 1; acted = true; break;
            case " ": acted = true; log("Вы ожидаете...", "#aaa"); break;
        }

        if (acted) {
            e.preventDefault(); // Предотвращаем скролл страницы
            
            // Простая проверка коллизий
            const newX = player.x + dx;
            const newY = player.y + dy;
            
            // Проверка границ массива
            if (newY >= 0 && newY < GAME_HEIGHT && newX >= 0 && newX < GAME_WIDTH) {
                if (mapData[newY][newX] === 0) { // 0 - пол
                    player.x = newX;
                    player.y = newY;
                    // log("Шаг...", "#888");
                } else {
                    // log("Стена!", "#555");
                }
            }
            
            drawMap();
        }
    });

    // Запуск
    log("Инициализация системы...", "#0f0");
    drawMap();

</script>
</body>
</html>
