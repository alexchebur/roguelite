<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Roguelike: Подземелье Координат</title>
    
    <!-- ROT.js v0.7.3 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/rot.js/0.7.3/rot.min.js"></script>
    <!-- Seedrandom -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    
    <!-- ВАШИ МОДУЛИ -->
    <script src="name_generator.js"></script>
    <script src="dungeon_generator.js"></script>

    <style>
        /* --- CSS: СТИЛИ ИНТЕРФЕЙСА --- */
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --danger: #f85149;
            --gold: #d29922;
            --font-stack: 'Consolas', 'Monaco', monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-stack);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #game-layout {
            display: grid;
            grid-template-columns: 260px 1fr 260px;
            grid-template-rows: 60px 1fr 140px;
            height: 100%;
            gap: 4px;
            padding: 4px;
            box-sizing: border-box;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        h3 {
            margin: 0 0 8px 0;
            font-size: 13px;
            text-transform: uppercase;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 4px;
            letter-spacing: 1px;
        }

        header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
        }
        .loc-info { text-align: right; }
        .loc-name { color: var(--accent); font-weight: bold; font-size: 1.1em; }
        .loc-coords { color: var(--text-dim); font-size: 0.85em; }
        .loc-desc { color: var(--text-dim); font-size: 0.8em; font-style: italic; margin-top: 2px;}
        .loc-type { color: var(--gold); font-size: 0.8em; margin-top: 2px; }

        /* Исправленный контейнер карты */
        #map-container {
            grid-column: 2;
            grid-row: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            padding: 0;
        }

        #map-container canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
        }

        .stat-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; }
        .val-hp { color: var(--danger); }
        .val-atk { color: var(--gold); }
        .val-def { color: var(--accent); }
        
        .equip-slot { font-size: 12px; margin-bottom: 4px; color: #aaa; }
        .equip-item { color: var(--gold); }

        #inventory-list { overflow-y: auto; flex: 0 0 auto; max-height: 30%; margin-bottom: 5px; }
        .inv-item {
            padding: 3px 5px;
            background: rgba(255,255,255,0.05);
            margin-bottom: 3px;
            cursor: pointer;
            font-size: 11px;
            border-radius: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .inv-item:hover { background: rgba(255,255,255,0.1); }

        #log-list {
            overflow-y: auto;
            flex: 1;
            font-size: 11px;
            display: flex;
            flex-direction: column-reverse;
        }
        .log-msg { margin-bottom: 2px; line-height: 1.2; word-wrap: break-word; }
        .log-combat { color: var(--danger); }
        .log-loot { color: var(--gold); }
        .log-info { color: var(--accent); }

        #minimap-panel {
            grid-column: 1;
            grid-row: 3;
            display: flex;
            flex-direction: column;
        }
        #minimap { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            border-radius: 4px;
            image-rendering: pixelated;
        }

        footer {
            grid-column: 2 / 4;
            grid-row: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            font-size: 12px;
            color: var(--text-dim);
        }
        kbd { background: #333; padding: 2px 6px; border-radius: 4px; color: #fff; border: 1px solid #444; }

    </style>
</head>
<body>

<div id="game-layout">
    <header class="panel">
        <div style="font-weight:bold; font-size:16px;">👾 Roguelike JS</div>
        <div class="loc-info">
            <div id="ui-loc-name" class="loc-name">Инициализация...</div>
            <div id="ui-loc-type" class="loc-type"></div>
            <div id="ui-loc-desc" class="loc-desc"></div>
            <div id="ui-loc-coords" class="loc-coords">X: 0, Y: 0</div>
        </div>
    </header>

    <div class="panel" style="grid-row: 2;">
        <h3>Персонаж</h3>
        <div id="ui-stats"></div>
        <h3 style="margin-top: 15px;">Экипировка</h3>
        <div id="ui-equip"></div>
    </div>

    <div id="map-container"></div>

    <div class="panel" style="grid-row: 2 / 4;">
        <h3>Инвентарь</h3>
        <div id="inventory-list"></div>
        <h3 style="margin-top: 10px;">Журнал событий</h3>
        <div id="log-list"></div>
    </div>

    <div id="minimap-panel" class="panel">
        <h3>Карта мира</h3>
        <canvas id="minimap"></canvas>
    </div>

    <footer class="panel">
        <span><kbd>←↑↓→</kbd> Движение / Атака</span>
        <span><kbd>Space</kbd> Пропуск хода</span>
        <span><kbd>Click</kbd> Использовать предмет</span>
    </footer>
</div>

<script>
/**
 * ====================================================================
 * МОДУЛЬ 1: DATA MODULE (Предметы и Враги)
 * ====================================================================
 */
const DataModule = {
    ITEM_ADJECTIVES: ["Ржавый", "Новый", "Тяжелый", "Острый", "Древний", "Магический"],
    
    ENEMY_TYPES: [
        { name: "Гоблин", char: "g", color: "#4CAF50", hp: [10, 20], atk: [2, 4], def: [0, 1] },
        { name: "Скелет", char: "s", color: "#B0BEC5", hp: [15, 25], atk: [3, 6], def: [1, 2] },
        { name: "Орк",    char: "O", color: "#8BC34A", hp: [30, 50], atk: [6, 10], def: [2, 4] },
        { name: "Призрак",char: "G", color: "#7C4DFF", hp: [10, 15], atk: [5, 8], def: [0, 1] },
        { name: "Дракон", char: "D", color: "#FF5722", hp: [80, 120], atk: [15, 25], def: [5, 10] }
    ],

    ITEM_TYPES: [
        { type: "weapon", char: "/", color: "#FFD700", baseName: "Меч", stat: "atk", val: [2, 5] },
        { type: "armor",  char: "]", color: "#9E9E9E", baseName: "Броня", stat: "def", val: [1, 3] },
        { type: "potion_hp", char: "!", color: "#f44336", baseName: "Зелье лечения", effect: "heal", val: [10, 20] },
        { type: "potion_str", char: "!", color: "#ff9800", baseName: "Зелье силы", effect: "buff_atk", val: [1, 2] }
    ],

    // Размеры карты теперь управляются DungeonGeneratorModule, но здесь зададим дефолт для UI
    MAP_WIDTH: 50,
    MAP_HEIGHT: 35
};

/**
 * ====================================================================
 * МОДУЛЬ 2: MAP WRAPPER (Обертка над DungeonGenerator)
 * ====================================================================
 */
const MapModule = {
    currentMapData: null, // 2D array from generator
    currentDungeonType: null,
    stairsUp: null,
    stairsDown: null,

    // Вызываем генератор
    generate: function(gx, gy) {
        const result = DungeonGeneratorModule.generateLevel(gx, gy, DataModule.MAP_WIDTH, DataModule.MAP_HEIGHT);
        
        this.currentMapData = result.mapData;
        this.currentDungeonType = result.dungeonType;
        
        // Лестницы пока ставим случайно в свободные клетки (упрощенно)
        // В идеале они должны быть частью генерации, но для совместимости:
        this.stairsDown = this._findRandomFloor(result.startPos);
        this.stairsUp = this._findRandomFloor(result.startPos, true);

        return result.startPos;
    },

    isWall: function(x, y) {
        if (!this.currentMapData) return true;
        if (x < 0 || x >= DataModule.MAP_WIDTH || y < 0 || y >= DataModule.MAP_HEIGHT) return true;
        return this.currentMapData[y][x] === 1;
    },

    getRandomFloor: function(excludePos) {
        return this._findRandomFloor(excludePos);
    },

    _findRandomFloor: function(excludePos, far=false) {
        let attempts = 0;
        while(attempts < 1000) {
            const x = Math.floor(Math.random() * DataModule.MAP_WIDTH);
            const y = Math.floor(Math.random() * DataModule.MAP_HEIGHT);
            
            if (this.currentMapData[y][x] === 0) {
                if (excludePos && x === excludePos.x && y === excludePos.y) {
                    attempts++; continue;
                }
                // Если нужно далеко от старта
                if (far && excludePos) {
                    const dist = Math.abs(x - excludePos.x) + Math.abs(y - excludePos.y);
                    if (dist < 10) { attempts++; continue; }
                }
                return {x, y};
            }
            attempts++;
        }
        return excludePos || {x:0, y:0};
    }
};

/**
 * ====================================================================
 * МОДУЛЬ 3: ENTITY MODULE
 * ====================================================================
 */
const EntityModule = {
    createPlayer: function(x, y) {
        return {
            x: x, y: y,
            char: "@", color: "#FFF",
            hp: 50, maxHp: 50,
            atk: 5, def: 2,
            level: 1, xp: 0,
            inventory: [],
            equipment: { weapon: null, armor: null }
        };
    },

    createEnemy: function(template, x, y, difficulty) {
        return {
            x: x, y: y, name: template.name,
            char: template.char, color: template.color,
            hp: Math.floor(template.hp[0] * difficulty), 
            maxHp: Math.floor(template.hp[0] * difficulty),
            atk: Math.floor(template.atk[0] * difficulty), 
            def: Math.floor(template.def[0] * difficulty),
            isEnemy: true
        };
    },

    createItem: function(template, x, y) {
        const adj = DataModule.ITEM_ADJECTIVES[Math.floor(Math.random() * DataModule.ITEM_ADJECTIVES.length)];
        const name = `${adj} ${template.baseName}`;
        const val = Math.floor(template.val[0] + Math.random()*(template.val[1]-template.val[0]));
        
        return {
            x: x, y: y, name: name,
            char: template.char, color: template.color,
            type: template.type,
            stat: template.stat,
            effect: template.effect,
            val: val,
            isItem: true
        };
    }
};

/**
 * ====================================================================
 * МОДУЛЬ 4: COMBAT MODULE
 * ====================================================================
 */
const CombatModule = {
    attack: function(attacker, defender, logFn) {
        let dmg = Math.max(1, attacker.atk - defender.def);
        let crit = Math.random() < 0.1;
        if (crit) dmg = Math.floor(dmg * 1.5);

        defender.hp -= dmg;
        logFn(`${attacker.name || "Вы"} бьет ${defender.name || "врага"} на ${dmg}${crit?" (КРИТ)!":"."}`, "combat");

        if (defender.hp <= 0) {
            logFn(`${defender.name || "Враг"} погибает!`, "info");
            return true;
        }
        return false;
    },

    useItem: function(player, index, logFn, updateUiFn) {
        const item = player.inventory[index];
        if (!item) return;

        let used = false;

        if (item.effect === "heal") {
            player.hp = Math.min(player.maxHp, player.hp + item.val);
            logFn(`Вы выпили ${item.name}. HP +${item.val}.`, "loot");
            used = true;
        } else if (item.effect === "buff_atk") {
            player.atk += item.val;
            logFn(`Вы выпили ${item.name}. Сила +${item.val}.`, "loot");
            used = true;
        } else if (item.type === "weapon") {
            if (player.equipment.weapon) {
                player.atk -= player.equipment.weapon.val;
                player.inventory.push(player.equipment.weapon);
            }
            player.equipment.weapon = item;
            player.atk += item.val;
            logFn(`Вы взяли ${item.name}. Атака +${item.val}.`, "loot");
            used = true;
        } else if (item.type === "armor") {
            if (player.equipment.armor) {
                player.def -= player.equipment.armor.val;
                player.inventory.push(player.equipment.armor);
            }
            player.equipment.armor = item;
            player.def += item.val;
            logFn(`Вы надели ${item.name}. Защита +${item.val}.`, "loot");
            used = true;
        }

        if (used) {
            player.inventory.splice(index, 1);
            updateUiFn();
        }
    }
};

/**
 * ====================================================================
 * МОДУЛЬ 5: RENDER MODULE (С УЧЕТОМ ТИПА ПОДЗЕМЕЛЬЯ)
 * ====================================================================
 */
const RenderModule = {
    display: null,
    fov: null,
    COLS: DataModule.MAP_WIDTH,
    ROWS: DataModule.MAP_HEIGHT,
    FONT_SIZE: 16,

    init: function() {
        this.display = new ROT.Display({
            width: this.COLS,
            height: this.ROWS,
            fontSize: this.FONT_SIZE,
            fontFamily: "Consolas, monospace",
            fg: "#ccc",
            bg: "#000"
        });
        
        const container = document.getElementById("map-container");
        container.innerHTML = ""; 
        container.appendChild(this.display.getContainer());
        
        this.fov = new ROT.FOV.PreciseShadowcasting((x,y) => !MapModule.isWall(x,y));
    },

    draw: function(player, enemies, items) {
        this.display.clear();
        const visible = new Set();
        const dtype = MapModule.currentDungeonType || DUNGEON_TYPES[0];

        this.fov.compute(player.x, player.y, 10, (x, y, r, vis) => {
            if (vis) visible.add(`${x},${y}`);
        });

        visible.forEach(key => {
            const [x, y] = key.split(',').map(Number);
            let ch, fg, bg;

            if (MapModule.isWall(x, y)) {
                ch = dtype.wallChar;
                fg = dtype.wallColor;
                bg = "#000";
            } else {
                ch = dtype.floorChar;
                fg = dtype.floorColor;
                bg = "#000";
            }
            
            // Лестницы
            if (MapModule.stairsUp && x === MapModule.stairsUp.x && y === MapModule.stairsUp.y) { 
                ch = ">"; fg = "#FFF"; 
            }
            if (MapModule.stairsDown && x === MapModule.stairsDown.x && y === MapModule.stairsDown.y) { 
                ch = "<"; fg = "#888"; 
            }

            this.display.draw(x, y, ch, fg, bg);
        });

        items.forEach(i => {
            if (visible.has(`${i.x},${i.y}`)) this.display.draw(i.x, i.y, i.char, i.color);
        });

        enemies.forEach(e => {
            if (e.hp > 0 && visible.has(`${e.x},${e.y}`)) this.display.draw(e.x, e.y, e.char, e.color);
        });

        this.display.draw(player.x, player.y, player.char, player.color);

        return visible;
    },

    updateUI: function(player, locData) {
        if (locData) {
            document.getElementById("ui-loc-name").textContent = locData.fullName;
            document.getElementById("ui-loc-desc").textContent = locData.description;
            document.getElementById("ui-loc-type").textContent = `Тип: ${locData.themeName} (${MapModule.currentDungeonType ? MapModule.currentDungeonType.name : '?'})`;
        }

        document.getElementById("ui-stats").innerHTML = `
            <div class="stat-row"><span>HP</span> <span class="val-hp">${player.hp}/${player.maxHp}</span></div>
            <div class="stat-row"><span>Атака</span> <span class="val-atk">${player.atk}</span></div>
            <div class="stat-row"><span>Защита</span> <span class="val-def">${player.def}</span></div>
            <div class="stat-row"><span>Уровень</span> <span>${player.level}</span></div>
        `;
        const w = player.equipment.weapon ? player.equipment.weapon.name : "—";
        const a = player.equipment.armor ? player.equipment.armor.name : "—";
        document.getElementById("ui-equip").innerHTML = `
            <div class="equip-slot">Рука: <span class="equip-item">${w}</span></div>
            <div class="equip-slot">Тело: <span class="equip-item">${a}</span></div>
        `;
        const invDiv = document.getElementById("inventory-list");
        invDiv.innerHTML = "";
        if (player.inventory.length === 0) invDiv.innerHTML = "<div style='color:#555;font-size:11px'>Пусто</div>";
        player.inventory.forEach((item, idx) => {
            const div = document.createElement("div");
            div.className = "inv-item";
            div.style.color = item.color;
            div.textContent = `${item.char} ${item.name} (+${item.val})`;
            div.onclick = () => CombatModule.useItem(player, idx, this.log, () => this.updateUI(player, locData));
            invDiv.appendChild(div);
        });
    },

    log: function
